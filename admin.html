<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin — Licencias</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:#0f0f13;color:#e2e8f0;min-height:100vh}
  input,select,textarea{font-family:'Inter',sans-serif}
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-track{background:#1a1a24}
  ::-webkit-scrollbar-thumb{background:#DA0081;border-radius:3px}
  .fade{animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const SUPABASE_URL = 'https://stsbkesnajbgzdummxzh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN0c2JrZXNuYWpiZ3pkdW1teHpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMzYyNjcsImV4cCI6MjA5MjkxMjI2N30.ZP7aP4NGWvZCJKRFJy1ZHTARVFwifKNi8SZWRCTfUJU';
const ADMIN_PIN = '1234'; // Cambia este PIN

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Colores estado ────────────────────────────────────────────────────────────
const statusStyle = (s) => ({
  active:   { bg:'#052e16', color:'#4ade80', label:'Activo' },
  expired:  { bg:'#431407', color:'#fb923c', label:'Expirado' },
  blocked:  { bg:'#3b0764', color:'#e879f9', label:'Bloqueado' },
  pending:  { bg:'#1e1b4b', color:'#818cf8', label:'Pendiente' },
}[s] || { bg:'#1f2937', color:'#9ca3af', label:'Desconocido' });

const diasRestantes = (endDate) => {
  if (!endDate) return null;
  const diff = new Date(endDate) - new Date();
  return Math.ceil(diff / (1000*60*60*24));
};

const calcStatus = (t) => {
  if (t.is_blocked) return 'blocked';
  if (!t.license_end) return 'pending';
  const dias = diasRestantes(t.license_end);
  if (dias <= 0) return 'expired';
  return 'active';
};

// ── Login Screen ──────────────────────────────────────────────────────────────
const LoginScreen = ({ onLogin }) => {
  const [pin, setPin] = useState('');
  const [err, setErr] = useState(false);
  const handle = () => {
    if (pin === ADMIN_PIN) { onLogin(); }
    else { setErr(true); setTimeout(()=>setErr(false),1500); setPin(''); }
  };
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'linear-gradient(135deg,#0f0f13 0%,#1a0a2e 100%)'}}>
      <div className="fade" style={{background:'#16161f',border:'1px solid #2a2a3a',borderRadius:24,padding:40,width:340,textAlign:'center'}}>
        <div style={{width:64,height:64,background:'linear-gradient(135deg,#DA0081,#9333ea)',borderRadius:20,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px',fontSize:28}}>🔐</div>
        <h2 style={{fontSize:22,fontWeight:800,marginBottom:6}}>Panel Admin</h2>
        <p style={{color:'#6b7280',fontSize:13,marginBottom:24}}>Gestión de Licencias</p>
        <input
          type="password" value={pin} onChange={e=>setPin(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&handle()}
          placeholder="PIN de acceso"
          style={{width:'100%',padding:'12px 16px',borderRadius:12,border:`1.5px solid ${err?'#ef4444':'#2a2a3a'}`,background:'#0f0f13',color:'#e2e8f0',fontSize:16,textAlign:'center',letterSpacing:4,outline:'none',marginBottom:12,transition:'border .2s'}}
        />
        {err && <p style={{color:'#ef4444',fontSize:12,marginBottom:8}}>PIN incorrecto</p>}
        <button onClick={handle} style={{width:'100%',padding:'13px',borderRadius:12,border:'none',background:'linear-gradient(135deg,#DA0081,#9333ea)',color:'#fff',fontWeight:700,fontSize:15,cursor:'pointer'}}>
          Ingresar
        </button>
      </div>
    </div>
  );
};

// ── Modal Nueva/Editar Licencia ───────────────────────────────────────────────
const LicenseModal = ({ tenant, onClose, onSaved }) => {
  const isEdit = !!tenant;
  const generatePassword = () => {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
    let pass = '';
    for(let i=0;i<8;i++) pass += chars.charAt(Math.floor(Math.random()*chars.length));
    return pass;
  };
  const [form, setForm] = useState({
    owner_name: tenant?.owner_name || '',
    business_name: tenant?.business_name || '',
    email: tenant?.email || '',
    phone: tenant?.phone || '',
    logo_url: tenant?.logo_url || '',
    password: tenant?.password || generatePassword(),
    duration_months: 1,
    is_blocked: tenant?.is_blocked || false,
  });
  const [saving, setSaving] = useState(false);
  const [logoPreview, setLogoPreview] = useState(tenant?.logo_url || '');
  const [createdCredentials, setCreatedCredentials] = useState(null); // {email, password, url}

  const set = (k,v) => setForm(p=>({...p,[k]:v}));

  const handleLogoFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => { setLogoPreview(ev.target.result); set('logo_url', ev.target.result); };
    reader.readAsDataURL(file);
  };

  const save = async () => {
    if (!form.owner_name || !form.email) return alert('Nombre y email son obligatorios.');
    setSaving(true);
    try {
      const startDate = isEdit ? (tenant.license_start || new Date().toISOString().split('T')[0]) : new Date().toISOString().split('T')[0];
      const end = new Date(startDate);
      end.setMonth(end.getMonth() + Number(form.duration_months));
      // Logo: si es muy largo (>500KB base64), no guardarlo en DB
      let logoToSave = form.logo_url;
      if (logoToSave && logoToSave.length > 500000) {
        logoToSave = ''; // Demasiado grande para columna TEXT
        console.warn('Logo demasiado grande, se omitió.');
      }
      const payload = {
        name: form.business_name || form.owner_name, // Campo obligatorio en tabla original
        owner_name: form.owner_name,
        business_name: form.business_name,
        email: form.email,
        phone: form.phone,
        logo_url: logoToSave,
        password: form.password,
        license_start: startDate,
        license_end: end.toISOString().split('T')[0],
        is_blocked: form.is_blocked,
      };
      let err;
      if (isEdit) {
        ({ error: err } = await sb.from('tenants').update(payload).eq('id', tenant.id));
      } else {
        ({ error: err } = await sb.from('tenants').insert(payload));
      }
      if (err) { console.error('Supabase error:', err); throw err; }
      if (!isEdit) {
        // Mostrar credenciales al crear
        setCreatedCredentials({ email: form.email, password: form.password, businessName: form.business_name || form.owner_name });
      } else {
        onSaved();
      }
    } catch(e) { alert('Error: ' + (e.message || JSON.stringify(e))); }
    finally { setSaving(false); }
  };

  const inp = (label, key, type='text', placeholder='') => (
    <div style={{marginBottom:14}}>
      <label style={{display:'block',fontSize:11,fontWeight:600,color:'#6b7280',textTransform:'uppercase',letterSpacing:.5,marginBottom:5}}>{label}</label>
      <input type={type} value={form[key]} onChange={e=>set(key, type==='number'?Number(e.target.value):e.target.value)}
        placeholder={placeholder}
        style={{width:'100%',padding:'10px 14px',borderRadius:10,border:'1.5px solid #2a2a3a',background:'#0f0f13',color:'#e2e8f0',fontSize:14,outline:'none'}}
      />
    </div>
  );

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.7)',backdropFilter:'blur(4px)',zIndex:200,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div className="fade" style={{background:'#16161f',border:'1px solid #2a2a3a',borderRadius:24,width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto',padding:28}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
          <h3 style={{fontSize:18,fontWeight:800}}>{isEdit ? 'Editar Licencia' : 'Nueva Licencia'}</h3>
          <button onClick={onClose} style={{background:'#1f1f2e',border:'none',color:'#9ca3af',borderRadius:8,padding:'6px 10px',cursor:'pointer',fontSize:18}}>✕</button>
        </div>

        {/* Logo */}
        <div style={{marginBottom:18,textAlign:'center'}}>
          <div style={{width:80,height:80,borderRadius:20,background:'#1f1f2e',border:'2px dashed #3a3a4a',margin:'0 auto 10px',overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center'}}>
            {logoPreview ? <img src={logoPreview} style={{width:'100%',height:'100%',objectFit:'cover'}}/> : <span style={{fontSize:28}}>🏢</span>}
          </div>
          <label style={{cursor:'pointer',background:'#1f1f2e',padding:'6px 14px',borderRadius:8,fontSize:12,color:'#a78bfa',border:'1px solid #3a3a4a'}}>
            📷 Subir Logo
            <input type="file" accept="image/*" onChange={handleLogoFile} style={{display:'none'}}/>
          </label>
        </div>

        {inp('Nombre del Cliente', 'owner_name','text','Ej. Juan Pérez')}
        {inp('Nombre del Negocio', 'business_name','text','Ej. Créditos López')}
        {inp('Correo Electrónico', 'email','email','cliente@gmail.com')}
        {inp('Teléfono / WhatsApp', 'phone','tel','3001234567')}

        {/* Contraseña */}
        <div style={{marginBottom:14}}>
          <label style={{display:'block',fontSize:11,fontWeight:600,color:'#6b7280',textTransform:'uppercase',letterSpacing:.5,marginBottom:5}}>Contraseña de Acceso</label>
          <div style={{display:'flex',gap:8}}>
            <input type="text" value={form.password} onChange={e=>set('password',e.target.value)}
              placeholder="Contraseña"
              style={{flex:1,padding:'10px 14px',borderRadius:10,border:'1.5px solid #2a2a3a',background:'#0f0f13',color:'#e2e8f0',fontSize:14,outline:'none',fontFamily:'monospace'}}
            />
            <button type="button" onClick={()=>set('password',generatePassword())}
              style={{padding:'10px 14px',borderRadius:10,border:'1px solid #3a3a4a',background:'#1f1f2e',color:'#a78bfa',fontSize:12,fontWeight:600,cursor:'pointer',flexShrink:0}}
            >🔄 Generar</button>
          </div>
          <p style={{fontSize:10,color:'#4b5563',marginTop:4}}>El usuario siempre será el correo electrónico</p>
        </div>

        <div style={{marginBottom:14}}>
          <label style={{display:'block',fontSize:11,fontWeight:600,color:'#6b7280',textTransform:'uppercase',letterSpacing:.5,marginBottom:5}}>Duración (meses)</label>
          <div style={{display:'flex',alignItems:'center',border:'1.5px solid #2a2a3a',borderRadius:10,overflow:'hidden',background:'#0f0f13'}}>
            <button type="button" onClick={()=>set('duration_months',Math.max(1,form.duration_months-1))}
              style={{minWidth:44,minHeight:44,background:'#1a1a28',border:'none',color:'#DA0081',fontSize:22,cursor:'pointer',flexShrink:0}}>−</button>
            <span style={{flex:1,textAlign:'center',fontWeight:800,fontSize:20,color:'#e2e8f0'}}>{form.duration_months}</span>
            <button type="button" onClick={()=>set('duration_months',form.duration_months+1)}
              style={{minWidth:44,minHeight:44,background:'#1a1a28',border:'none',color:'#DA0081',fontSize:22,cursor:'pointer',flexShrink:0}}>+</button>
          </div>
          <p style={{fontSize:11,color:'#6b7280',marginTop:5}}>
            Vence: {(() => { const d = new Date(); d.setMonth(d.getMonth()+form.duration_months); return d.toLocaleDateString('es-CO'); })()}
          </p>
        </div>

        <div style={{display:'flex',gap:10,marginTop:6}}>
          <button onClick={onClose} style={{flex:1,padding:13,borderRadius:12,border:'1px solid #2a2a3a',background:'transparent',color:'#9ca3af',fontWeight:600,cursor:'pointer'}}>Cancelar</button>
          <button onClick={save} disabled={saving} style={{flex:2,padding:13,borderRadius:12,border:'none',background:'linear-gradient(135deg,#DA0081,#9333ea)',color:'#fff',fontWeight:700,cursor:'pointer',opacity:saving?.7:1}}>
            {saving ? 'Guardando...' : (isEdit ? '💾 Actualizar' : '✅ Crear Licencia')}
          </button>
        </div>

        {/* Modal de Credenciales creadas */}
        {createdCredentials && (
          <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.85)',borderRadius:24,display:'flex',alignItems:'center',justifyContent:'center',padding:24,zIndex:10}}>
            <div style={{textAlign:'center',width:'100%'}}>
              <div style={{fontSize:48,marginBottom:12}}>✅</div>
              <h3 style={{fontSize:18,fontWeight:800,color:'#4ade80',marginBottom:4}}>¡Licencia Creada!</h3>
              <p style={{color:'#6b7280',fontSize:13,marginBottom:20}}>Envía estas credenciales al cliente:</p>
              <div style={{background:'#0f0f13',borderRadius:14,padding:16,textAlign:'left',marginBottom:16,border:'1px solid #2a2a3a'}}>
                <p style={{fontSize:11,color:'#6b7280',marginBottom:4}}>NEGOCIO</p>
                <p style={{fontSize:15,fontWeight:700,color:'#e2e8f0',marginBottom:12}}>{createdCredentials.businessName}</p>
                <p style={{fontSize:11,color:'#6b7280',marginBottom:4}}>USUARIO (correo)</p>
                <p style={{fontSize:15,fontWeight:600,color:'#a78bfa',marginBottom:12,fontFamily:'monospace'}}>{createdCredentials.email}</p>
                <p style={{fontSize:11,color:'#6b7280',marginBottom:4}}>CONTRASEÑA</p>
                <p style={{fontSize:18,fontWeight:800,color:'#DA0081',fontFamily:'monospace',letterSpacing:1}}>{createdCredentials.password}</p>
              </div>
              <button onClick={() => {
                const texto = `🔐 Credenciales de acceso:\n\n📧 Usuario: ${createdCredentials.email}\n🔑 Contraseña: ${createdCredentials.password}\n\n🌐 URL: ${window.location.origin}/index.html`;
                navigator.clipboard.writeText(texto);
                alert('✅ Credenciales copiadas al portapapeles');
              }} style={{width:'100%',padding:13,borderRadius:12,border:'none',background:'linear-gradient(135deg,#DA0081,#9333ea)',color:'#fff',fontWeight:700,cursor:'pointer',marginBottom:10,fontSize:14}}>
                📋 Copiar Credenciales
              </button>
              <button onClick={() => { setCreatedCredentials(null); onSaved(); }}
                style={{width:'100%',padding:13,borderRadius:12,border:'1px solid #2a2a3a',background:'transparent',color:'#9ca3af',fontWeight:600,cursor:'pointer',fontSize:14}}>
                Cerrar
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

// ── Tarjeta Tenant ────────────────────────────────────────────────────────────
const TenantCard = ({ t, onEdit, onToggleBlock, onRefresh }) => {
  const st = calcStatus(t);
  const { bg, color, label } = statusStyle(st);
  const dias = diasRestantes(t.license_end);
  const [toggling, setToggling] = useState(false);

  const toggleBlock = async () => {
    setToggling(true);
    const { error } = await sb.from('tenants').update({ is_blocked: !t.is_blocked }).eq('id', t.id);
    if (error) alert('Error: ' + error.message);
    else onRefresh();
    setToggling(false);
  };

  return (
    <div className="fade" style={{background:'#16161f',border:`1px solid ${st==='active'?'#134e2a':st==='expired'?'#431407':st==='blocked'?'#3b0764':'#2a2a3a'}`,borderRadius:20,padding:20,display:'flex',flexDirection:'column',gap:14}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',gap:14}}>
        <div style={{width:52,height:52,borderRadius:14,background:'#1f1f2e',overflow:'hidden',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>
          {t.logo_url ? <img src={t.logo_url} style={{width:'100%',height:'100%',objectFit:'cover'}}/> : '🏢'}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <p style={{fontWeight:700,fontSize:15,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.owner_name}</p>
          <p style={{color:'#6b7280',fontSize:12,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{t.business_name || '—'}</p>
        </div>
        <span style={{background:bg,color,borderRadius:20,padding:'4px 12px',fontSize:11,fontWeight:700,flexShrink:0}}>{label}</span>
      </div>

      {/* Info */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:12,color:'#9ca3af'}}>
        <div><span style={{color:'#4b5563'}}>📧 </span>{t.email}</div>
        <div><span style={{color:'#4b5563'}}>📱 </span>{t.phone || '—'}</div>
        <div><span style={{color:'#4b5563'}}>📅 Inicio: </span>{t.license_start ? new Date(t.license_start).toLocaleDateString('es-CO') : '—'}</div>
        <div><span style={{color:'#4b5563'}}>⏰ Vence: </span>{t.license_end ? new Date(t.license_end).toLocaleDateString('es-CO') : '—'}</div>
      </div>

      {/* Días restantes */}
      {dias !== null && (
        <div style={{background: dias <= 7 ? '#431407' : '#0f1f0f', borderRadius:10, padding:'8px 14px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <span style={{fontSize:12, color: dias <= 0 ? '#fb923c' : dias <= 7 ? '#fbbf24' : '#4ade80'}}>
            {dias <= 0 ? '⚠️ Licencia expirada' : dias <= 7 ? `⚠️ Vence en ${dias} días` : `✅ ${dias} días restantes`}
          </span>
          {dias <= 0 && !t.is_blocked && <span style={{fontSize:10,color:'#fb923c',fontWeight:600}}>Bloqueo automático</span>}
        </div>
      )}

      {/* URL del cliente */}
      <div style={{background:'#0f0f13',borderRadius:10,padding:'8px 12px',display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:10,color:'#6b7280',flexShrink:0}}>🔗 URL:</span>
        <span style={{fontSize:10,color:'#a78bfa',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontFamily:'monospace'}}>{`index.html?t=${t.id}`}</span>
        <button onClick={() => { navigator.clipboard.writeText(`${window.location.origin}/index.html?t=${t.id}`); alert('✅ URL copiada al portapapeles'); }}
          style={{background:'#1f1f2e',border:'1px solid #3a3a4a',borderRadius:6,padding:'4px 8px',color:'#a78bfa',fontSize:10,fontWeight:600,cursor:'pointer',flexShrink:0}}>
          📋 Copiar
        </button>
      </div>

      {/* Acciones */}
      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>onEdit(t)} style={{flex:1,padding:'9px',borderRadius:10,border:'1px solid #2a2a3a',background:'transparent',color:'#9ca3af',fontSize:12,fontWeight:600,cursor:'pointer'}}>
          ✏️ Editar
        </button>
        <button onClick={toggleBlock} disabled={toggling}
          style={{flex:1,padding:'9px',borderRadius:10,border:'none',background: t.is_blocked ? 'linear-gradient(135deg,#059669,#10b981)' : 'linear-gradient(135deg,#dc2626,#9333ea)',color:'#fff',fontSize:12,fontWeight:700,cursor:'pointer',opacity:toggling?.7:1}}>
          {toggling ? '...' : t.is_blocked ? '🔓 Desbloquear' : '🔒 Bloquear'}
        </button>
      </div>
    </div>
  );
};

// ── App Principal ─────────────────────────────────────────────────────────────
const App = () => {
  const [authed, setAuthed] = useState(false);
  const [tenants, setTenants] = useState([]);
  const [loading, setLoading] = useState(false);
  const [modal, setModal] = useState(null); // null | 'new' | tenant object
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('all');

  const fetchTenants = useCallback(async () => {
    setLoading(true);
    const { data, error } = await sb.from('tenants').select('*').order('created_at', { ascending: false });
    if (!error) setTenants(data || []);
    else console.error(error);
    setLoading(false);
  }, []);

  useEffect(() => { if (authed) fetchTenants(); }, [authed, fetchTenants]);

  // Auto-bloqueo de expirados al cargar
  useEffect(() => {
    if (!tenants.length) return;
    tenants.forEach(async t => {
      if (!t.is_blocked && t.license_end && diasRestantes(t.license_end) <= 0) {
        await sb.from('tenants').update({ is_blocked: true }).eq('id', t.id);
      }
    });
  }, [tenants]);

  if (!authed) return <LoginScreen onLogin={()=>setAuthed(true)} />;

  const filtered = tenants.filter(t => {
    const st = calcStatus(t);
    const matchSearch = !search || [t.owner_name,t.email,t.business_name,t.phone].join(' ').toLowerCase().includes(search.toLowerCase());
    const matchStatus = filterStatus === 'all' || st === filterStatus;
    return matchSearch && matchStatus;
  });

  const counts = {
    total: tenants.length,
    active: tenants.filter(t=>calcStatus(t)==='active').length,
    expired: tenants.filter(t=>calcStatus(t)==='expired').length,
    blocked: tenants.filter(t=>calcStatus(t)==='blocked').length,
  };

  const statCard = (label, val, color, emoji) => (
    <div style={{background:'#16161f',border:'1px solid #2a2a3a',borderRadius:16,padding:'16px 20px',flex:1,minWidth:0}}>
      <p style={{fontSize:11,color:'#6b7280',fontWeight:600,marginBottom:4}}>{emoji} {label}</p>
      <p style={{fontSize:28,fontWeight:800,color}}>{val}</p>
    </div>
  );

  return (
    <div style={{minHeight:'100vh',background:'#0f0f13'}}>
      {/* Header */}
      <div style={{background:'linear-gradient(135deg,#1a0a2e 0%,#16161f 100%)',borderBottom:'1px solid #2a2a3a',padding:'20px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
        <div style={{display:'flex',alignItems:'center',gap:14}}>
          <div style={{width:44,height:44,background:'linear-gradient(135deg,#DA0081,#9333ea)',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>🔐</div>
          <div>
            <h1 style={{fontSize:18,fontWeight:800,lineHeight:1.2}}>Panel de Licencias</h1>
            <p style={{color:'#6b7280',fontSize:12}}>Gestión de clientes SaaS</p>
          </div>
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          <a href="index.html" target="_blank" style={{padding:'9px 16px',borderRadius:10,border:'1px solid #2a2a3a',background:'transparent',color:'#9ca3af',fontSize:13,fontWeight:600,textDecoration:'none',display:'inline-block'}}>
            👁️ Ver App
          </a>
          <button onClick={()=>setModal('new')}
            style={{padding:'9px 18px',borderRadius:10,border:'none',background:'linear-gradient(135deg,#DA0081,#9333ea)',color:'#fff',fontWeight:700,fontSize:13,cursor:'pointer'}}>
            + Nueva Licencia
          </button>
        </div>
      </div>

      <div style={{maxWidth:1100,margin:'0 auto',padding:24}}>
        {/* Stats */}
        <div style={{display:'flex',gap:12,marginBottom:24,flexWrap:'wrap'}}>
          {statCard('Total Clientes', counts.total, '#e2e8f0', '👥')}
          {statCard('Activos', counts.active, '#4ade80', '✅')}
          {statCard('Expirados', counts.expired, '#fb923c', '⏰')}
          {statCard('Bloqueados', counts.blocked, '#e879f9', '🔒')}
        </div>

        {/* Filtros */}
        <div style={{display:'flex',gap:10,marginBottom:20,flexWrap:'wrap'}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar cliente..."
            style={{flex:1,minWidth:200,padding:'10px 16px',borderRadius:12,border:'1.5px solid #2a2a3a',background:'#16161f',color:'#e2e8f0',fontSize:14,outline:'none'}}
          />
          {['all','active','expired','blocked'].map(s=>(
            <button key={s} onClick={()=>setFilterStatus(s)}
              style={{padding:'10px 16px',borderRadius:12,border:`1.5px solid ${filterStatus===s?'#DA0081':'#2a2a3a'}`,background:filterStatus===s?'rgba(218,0,129,.15)':'transparent',color:filterStatus===s?'#DA0081':'#6b7280',fontWeight:600,fontSize:13,cursor:'pointer'}}>
              {s==='all'?'Todos':s==='active'?'✅ Activos':s==='expired'?'⏰ Expirados':'🔒 Bloqueados'}
            </button>
          ))}
        </div>

        {/* Grid de Tenants */}
        {loading ? (
          <div style={{textAlign:'center',padding:60,color:'#6b7280'}}>Cargando...</div>
        ) : filtered.length === 0 ? (
          <div style={{textAlign:'center',padding:60}}>
            <div style={{fontSize:48,marginBottom:12}}>🏜️</div>
            <p style={{color:'#6b7280',fontSize:15}}>{tenants.length===0?'Sin licencias aún. Crea la primera.':'Sin resultados para esta búsqueda.'}</p>
            {tenants.length===0 && <button onClick={()=>setModal('new')} style={{marginTop:16,padding:'12px 24px',borderRadius:12,border:'none',background:'linear-gradient(135deg,#DA0081,#9333ea)',color:'#fff',fontWeight:700,cursor:'pointer'}}>+ Crear Primera Licencia</button>}
          </div>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:16}}>
            {filtered.map(t=>(
              <TenantCard key={t.id} t={t}
                onEdit={t=>setModal(t)}
                onToggleBlock={()=>{}}
                onRefresh={fetchTenants}
              />
            ))}
          </div>
        )}
      </div>

      {/* Modal */}
      {modal && (
        <LicenseModal
          tenant={modal==='new'?null:modal}
          onClose={()=>setModal(null)}
          onSaved={()=>{ setModal(null); fetchTenants(); }}
        />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
