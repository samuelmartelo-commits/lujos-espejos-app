                            </div>
                        </div>

                        <div className="p-6 border-t border-gray-50 bg-white">
                            <button
                                onClick={handleCerrarCaja}
                                disabled={isLoading || efectivoMano === ''}
                                className="w-full bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-[0_8px_20px_rgba(0,0,0,0.1)] active:scale-[0.98] transition-all disabled:opacity-70 disabled:cursor-not-allowed"
                            >
                                {isLoading ? 'Procesando...' : 'Confirmar Cierre'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Reports View (Reporte de Gastos) ---
        const ReportsView = () => {
            const [isCerrarModalOpen, setIsCerrarModalOpen] = useState(false);
            const [expenses, setExpenses] = useState([]);
            const [recaudoHoy, setRecaudoHoy] = useState(0);
            const [gastosHoy, setGastosHoy] = useState(0);
            const [isLoaded, setIsLoaded] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [periodoFiltro, setPeriodoFiltro] = useState('7'); // días
            const [isLoadingExpenses, setIsLoadingExpenses] = useState(false);

            const fetchExpensesData = async () => {
                setIsLoadingExpenses(true);
                if (!supabase) {
                    setRecaudoHoy(150000); setGastosHoy(20000); setIsLoaded(true);
                    setIsLoadingExpenses(false); return;
                }
                try {
                    const dias = Number(periodoFiltro);
                    const desde = new Date(Date.now() - dias * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                    const todayStr = new Date().toISOString().split('T')[0];

                    // Gastos del período
                    const { data: expData } = await supabase
                        .from('expenses')
                        .select('*')
                        .eq('tenant_id', DEFAULT_TENANT_ID)
                        .gte('fecha_gasto', desde)
                        .order('fecha_gasto', { ascending: false });

                    // Pagos del período para recaudo
                    const { data: paymentsData } = await supabase
                        .from('payments')
                        .select('amount, created_at')
                        .eq('tenant_id', DEFAULT_TENANT_ID)
                        .gte('created_at', desde);

                    let rHoy = 0, gHoy = 0;
                    if (paymentsData) {
                        paymentsData.forEach(p => {
                            if (p.created_at?.startsWith(todayStr)) rHoy += Number(p.amount);
                        });
                    }
                    if (expData) {
                        expData.forEach(e => {
                            if ((e.fecha_gasto || e.created_at?.split('T')[0]) === todayStr) gHoy += Number(e.amount);
                        });
                        setExpenses(expData);
                    }
                    setRecaudoHoy(rHoy);
                    setGastosHoy(gHoy);

                    // Render chart with expense data grouped by day
                    const labels = [];
                    const dataGastos = Array(dias).fill(0);
                    for (let i = dias - 1; i >= 0; i--) {
                        const d = new Date(Date.now() - i * 24 * 60 * 60 * 1000);
                        labels.push(d.toLocaleDateString('es-CO', { day: '2-digit', month: 'short' }));
                    }
                    if (expData) {
                        expData.forEach(e => {
                            const fechaExp = e.fecha_gasto || e.created_at?.split('T')[0];
                            if (!fechaExp) return;
                            const diff = Math.floor((new Date() - new Date(fechaExp)) / (1000 * 60 * 60 * 24));
                            if (diff >= 0 && diff < dias) dataGastos[dias - 1 - diff] += Number(e.amount);
                        });
                    }
                    renderChart(dataGastos, labels);
                    setIsLoaded(true);
                } catch (err) { console.error('Error fetching reports:', err); }
                finally { setIsLoadingExpenses(false); }
            };

            useEffect(() => { fetchExpensesData(); }, [periodoFiltro]);

            const renderChart = (gastos, labels) => {
                const ctx = document.getElementById('reportsChart');
                if (!ctx) return;
                if (window.reportsChartInstance) window.reportsChartInstance.destroy();
                window.reportsChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [{
                            label: 'Gastos por Día',
                            data: gastos,
                            backgroundColor: (ctx) => {
                                const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 200);
                                g.addColorStop(0, '#DA0081');
                                g.addColorStop(1, 'rgba(218,0,129,0.3)');
                                return g;
                            },
                            borderRadius: 8,
                            barPercentage: 0.65
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                backgroundColor: 'rgba(17,24,39,0.95)',
                                titleFont: { size: 11, family: 'Inter' },
                                bodyFont: { size: 12, family: 'Inter' },
                                padding: 10, cornerRadius: 8,
                                callbacks: {
                                    label: ctx => formatCurrency(ctx.parsed.y)
                                }
                            }
                        },
                        scales: {
                            y: { display: false, beginAtZero: true },
                            x: {
                                grid: { display: false },
                                ticks: { font: { family: 'Inter', size: 10 }, color: '#94a3b8', maxRotation: 45 }
                            }
                        }
                    }
                });
            };

            const exportExpensesExcel = () => {
                if (!window.XLSX) { alert('Librería Excel no disponible.'); return; }
                const data = filteredExpenses.map(e => ({
                    'Fecha': e.fecha_gasto || e.created_at?.split('T')[0] || '',
                    'Valor': Number(e.amount),
                    'Categoría': e.category || '',
                    'Descripción': e.description || ''
                }));
                const ws = window.XLSX.utils.json_to_sheet(data);
                ws['!cols'] = [{ wch: 14 }, { wch: 16 }, { wch: 18 }, { wch: 35 }];
                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, 'Gastos');
                window.XLSX.writeFile(wb, `Reporte_Gastos_${periodoFiltro}dias_${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            const catColors = { transporte: 'bg-blue-100 text-blue-700', alimentacion: 'bg-orange-100 text-orange-700', comunicaciones: 'bg-purple-100 text-purple-700', otros: 'bg-gray-100 text-gray-600' };
            const catLabels = { transporte: '🚗 Transporte', alimentacion: '☕ Comida', comunicaciones: '📱 Datos', otros: '➕ Otros' };

            const filteredExpenses = expenses.filter(e =>
                !searchTerm ||
                (e.description || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                (e.category || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                (e.fecha_gasto || '').includes(searchTerm)
            );

            const totalGastosPeriodo = filteredExpenses.reduce((s, e) => s + Number(e.amount), 0);

            return (
                <div className="pb-24 fade-in">
                    <div className="bg-gray-900 px-6 pt-8 pb-20 text-white relative z-0">
                        <div className="flex justify-between items-start">
                            <div>
                                <h2 className="text-2xl font-bold mb-1">Reporte de Gastos</h2>
                                <p className="text-gray-400 text-sm">Evolución de Caja</p>
                            </div>
                            <div className="flex gap-2">
                                {['7', '14', '30'].map(d => (
                                    <button key={d} onClick={() => setPeriodoFiltro(d)}
                                        style={{ padding: '6px 12px', borderRadius: 20, fontSize: 11, fontWeight: 700, border: 'none', background: periodoFiltro === d ? '#DA0081' : 'rgba(255,255,255,0.1)', color: '#fff', cursor: 'pointer' }}
                                    >{d}d</button>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="max-w-md mx-auto px-4 -mt-12 space-y-4 relative z-10">
                        {/* Tarjeta Resumen */}
                        <div className="bg-white rounded-3xl p-5 shadow-[0_8px_30px_rgb(0,0,0,0.06)] border border-gray-50">
                            <p className="text-sm font-medium text-gray-500 mb-1">Total Gastos ({periodoFiltro} días)</p>
                            <h2 className="text-4xl font-extrabold text-gray-900 tracking-tight">{formatCurrency(totalGastosPeriodo)}</h2>
                            <div className="grid grid-cols-2 gap-4 mt-4 pt-4 border-t border-gray-50">
                                <div>
                                    <p className="text-xs text-gray-500 mb-1 flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-nequi"></span> Recaudo Hoy</p>
                                    <p className="font-bold text-gray-900 text-sm">{formatCurrency(recaudoHoy)}</p>
                                </div>
                                <div>
                                    <p className="text-xs text-gray-500 mb-1 flex items-center gap-1"><span className="w-2 h-2 rounded-full bg-slate-500"></span> Gastos Hoy</p>
                                    <p className="font-bold text-gray-900 text-sm">{formatCurrency(gastosHoy)}</p>
                                </div>
                            </div>
                        </div>

                        {/* Gráfico de Barras */}
                        <div className="bg-white rounded-3xl p-5 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-50">
                            <h3 className="font-bold text-gray-900 mb-4 text-sm">Gastos por Día</h3>
                            <div className="h-44 w-full relative">
                                {!isLoaded && (
                                    <div className="absolute inset-0 flex items-center justify-center bg-white/80 z-10">
                                        <div className="w-8 h-8 border-2 border-nequi border-t-transparent rounded-full animate-spin"></div>
                                    </div>
                                )}
                                <canvas id="reportsChart"></canvas>
                            </div>
                        </div>

                        {/* Tabla Detalle Excel-Style */}
                        <div className="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-50 overflow-hidden">
                            <div className="p-4 border-b border-gray-50 flex justify-between items-center gap-3">
                                <div className="flex-1 relative">
                                    <svg className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                                    <input
                                        type="text"
                                        placeholder="Buscar gastos..."
                                        value={searchTerm}
                                        onChange={e => setSearchTerm(e.target.value)}
                                        className="w-full pl-9 pr-3 py-2 text-sm bg-gray-50 rounded-xl border-0 focus:ring-2 focus:ring-nequi outline-none"
                                    />
                                </div>
                                <button onClick={exportExpensesExcel}
                                    className="flex items-center gap-1.5 bg-green-600 text-white text-xs font-bold px-3 py-2 rounded-xl hover:bg-green-700 active:scale-95 transition-all whitespace-nowrap"
                                >
                                    <IconDownload className="w-3.5 h-3.5" /> Excel
                                </button>
                            </div>

                            {/* Header Table */}
                            <div style={{ display: 'grid', gridTemplateColumns: '100px 100px 90px 1fr', background: 'linear-gradient(135deg,#DA0081,#c4006f)', color: '#fff', fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5 }}>
                                <div style={{ padding: '8px 12px' }}>Fecha</div>
                                <div style={{ padding: '8px 8px' }}>Valor</div>
                                <div style={{ padding: '8px 8px' }}>Categoría</div>
                                <div style={{ padding: '8px 8px' }}>Descripción</div>
                            </div>

                            <div style={{ maxHeight: 320, overflowY: 'auto' }}>
                                {isLoadingExpenses ? (
                                    <div style={{ padding: '30px', textAlign: 'center', color: '#9ca3af', fontSize: 13 }}>Cargando gastos...</div>
                                ) : filteredExpenses.length === 0 ? (
                                    <div style={{ padding: '30px', textAlign: 'center', color: '#9ca3af', fontSize: 13 }}>
                                        <div style={{ fontSize: 32, marginBottom: 8 }}>💸</div>
                                        No hay gastos en este período.
                                    </div>
                                ) : filteredExpenses.map((e, idx) => (
                                    <div key={e.id || idx} style={{ display: 'grid', gridTemplateColumns: '100px 100px 90px 1fr', background: idx % 2 === 0 ? '#fff' : '#fdf2f8', borderBottom: '1px solid #f3e8ff', fontSize: 12, alignItems: 'center' }}>
                                        <div style={{ padding: '9px 12px', color: '#4b5563', fontWeight: 500 }}>{e.fecha_gasto || e.created_at?.split('T')[0] || '-'}</div>
                                        <div style={{ padding: '9px 8px', fontWeight: 700, color: '#DA0081' }}>{formatCurrency(e.amount)}</div>
                                        <div style={{ padding: '9px 8px' }}>
                                            <span style={{ fontSize: 9, fontWeight: 700, padding: '2px 7px', borderRadius: 20, background: '#fce7f3', color: '#DA0081', textTransform: 'uppercase' }}>
                                                {catLabels[e.category] || e.category}
                                            </span>
                                        </div>
                                        <div style={{ padding: '9px 8px', color: '#6b7280', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{e.description || '—'}</div>
                                    </div>
                                ))}
                            </div>

                            {filteredExpenses.length > 0 && (
                                <div style={{ padding: '10px 12px', background: '#f8fafc', borderTop: '2px solid #DA0081', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                    <span style={{ fontSize: 11, color: '#6b7280', fontWeight: 600 }}>{filteredExpenses.length} registros</span>
                                    <span style={{ fontSize: 13, fontWeight: 900, color: '#DA0081' }}>{formatCurrency(totalGastosPeriodo)}</span>
                                </div>
                            )}
                        </div>

                        {/* Cierre de Caja */}
                        <button
                            onClick={() => setIsCerrarModalOpen(true)}
                            className="w-full bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-[0_8px_20px_rgba(0,0,0,0.1)] active:scale-[0.98] transition-all flex justify-center items-center gap-2"
                        >
                            <IconArchive className="w-5 h-5" />
                            Cerrar Caja
                        </button>
                    </div>

                    <CerrarCajaModal
                        isOpen={isCerrarModalOpen}
                        onClose={() => setIsCerrarModalOpen(false)}
                        recaudoHoy={recaudoHoy}
                        gastosHoy={gastosHoy}
                    />
                </div>
            );
        };

        // Main App Component
        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(!!DEFAULT_TENANT_ID); // true si viene por URL
            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState('');
            const [loginLoading, setLoginLoading] = useState(false);
            const [session, setSession] = useState(null);
            const [isInitializing, setIsInitializing] = useState(true);
            const [activeTab, setActiveTab] = useState('home');
            const [loans, setLoans] = useState([]);
            const [creditLines, setCreditLines] = useState(defaultCreditLines);
            const [isNewLoanModalOpen, setIsNewLoanModalOpen] = useState(false);
            const [isCartulinaOpen, setIsCartulinaOpen] = useState(false);
            const [isEditLoanModalOpen, setIsEditLoanModalOpen] = useState(false);
            const [isGastoModalOpen, setIsGastoModalOpen] = useState(false);
            const [isCobroModalOpen, setIsCobroModalOpen] = useState(false);
            const [selectedLoanForCartulina, setSelectedLoanForCartulina] = useState(null);
            const [selectedLoanForEdit, setSelectedLoanForEdit] = useState(null);
            const [licenseStatus, setLicenseStatus] = useState('checking'); // 'checking' | 'active' | 'blocked' | 'expired'
            const [tenantInfo, setTenantInfo] = useState(null); // {business_name, owner_name}

            // ── Login con email + contraseña ──────────────────────────────────
            const handleLogin = async () => {
                if (!loginEmail || !loginPassword) { setLoginError('Ingresa email y contraseña'); return; }
                setLoginLoading(true);
                setLoginError('');
                try {
                    const { data, error } = await supabase
                        .from('tenants')
                        .select('id, password, business_name, owner_name, is_blocked, license_end')
                        .eq('email', loginEmail.trim().toLowerCase())
                        .maybeSingle();
                    if (error) throw error;
                    if (!data) { setLoginError('No existe una cuenta con ese correo'); return; }
                    if (data.password !== loginPassword) { setLoginError('Contraseña incorrecta'); return; }
                    // Login exitoso — establecer tenant
                    DEFAULT_TENANT_ID = data.id;
                    setTenantInfo({ business_name: data.business_name, owner_name: data.owner_name });
                    // Verificar licencia
                    if (data.is_blocked) { setLicenseStatus('blocked'); setIsLoggedIn(true); return; }
                    if (data.license_end) {
                        const daysLeft = Math.ceil((new Date(data.license_end) - new Date()) / (1000 * 60 * 60 * 24));
                        if (daysLeft <= 0) { setLicenseStatus('expired'); setIsLoggedIn(true); return; }
                    }
                    setLicenseStatus('active');
                    setIsLoggedIn(true);
                } catch (e) { setLoginError('Error de conexión: ' + e.message); }
                finally { setLoginLoading(false); }
            };

            // ── Verificación de Licencia (para acceso por URL) ────────────────
            const checkLicense = async () => {
                if (!supabase || !DEFAULT_TENANT_ID) { setLicenseStatus('active'); return; }
                try {
                    const { data, error } = await supabase
                        .from('tenants')
                        .select('is_blocked, license_end, business_name, owner_name')
                        .eq('id', DEFAULT_TENANT_ID)
                        .maybeSingle();
                    if (error || !data) {
                        setLicenseStatus('active');
                        return;
                    }
                    setTenantInfo({ business_name: data.business_name, owner_name: data.owner_name });
                    if (data.is_blocked) { setLicenseStatus('blocked'); return; }
                    if (data.license_end) {
                        const daysLeft = Math.ceil((new Date(data.license_end) - new Date()) / (1000 * 60 * 60 * 24));
                        if (daysLeft <= 0) { setLicenseStatus('expired'); return; }
                    }
                    setLicenseStatus('active');
                } catch (e) {
                    console.error('Error verificando licencia:', e);
                    setLicenseStatus('active');
                }
            };

            useEffect(() => {
                setIsInitializing(false);
                if (supabase && isLoggedIn && DEFAULT_TENANT_ID) {
                    checkLicense();
                    fetchData();
                }
            }, [isLoggedIn]);

            useEffect(() => {
                if (activeTab === 'home' && supabase) {
                    fetchData();
                }
            }, [activeTab]);

            const fetchData = async () => {
                if (!supabase) { setLoans([]); return; }
                try {
                    // Fetch Credit Lines
                    const { data: clData, error: clError } = await supabase.from('credit_lines').select('*').eq('tenant_id', DEFAULT_TENANT_ID);
                    if (clData && !clError) {
                        setCreditLines(clData.map(c => ({ id: c.id, name: c.name, rate: c.interest_rate, type: c.interest_type })));
                    }

                    // Fetch Loans with Client Info
                    const { data: loansData, error: loansError } = await supabase
                        .from('loans')
                        .select(`
                            *,
                            clients (
                                name,
                                document_id,
                                phone_main,
                                phone_backup,
                                address,
                                reference_point
                            ),
                            payments (
                                amount,
                                created_at
                            )
                        `)
                        .eq('tenant_id', DEFAULT_TENANT_ID)
                        .order('created_at', { ascending: false });

                    if (loansData && !loansError) {
                        const mappedLoans = loansData.map(l => {
                            // Cálculo Dinámico de Total y Pagos
                            const totalPayable = l.interest_type === 'simple'
                                ? l.amount * (1 + l.interest_rate / 100)
                                : l.amount * Math.pow((1 + l.interest_rate / 100), l.installments_total); // Simplificado

                            const cuotaValue = totalPayable / l.installments_total;

                            const sumPayments = l.payments ? l.payments.reduce((acc, p) => acc + Number(p.amount), 0) : 0;
                            const balance = totalPayable - sumPayments;

                            // Lógica de Estados (Integridad de Datos)
                            let dynamicStatus = l.status || 'active'; // Priorizar estado de DB o defecto

                            // Si no está inactivo, recalcular según el saldo y pagos
                            if (dynamicStatus !== 'inactive') {
                                if (balance <= 0.01) {
                                    dynamicStatus = 'completed'; // Cancelado
                                } else if (sumPayments < (l.installments_paid * cuotaValue) - 0.01) {
                                    dynamicStatus = 'partial'; // Pago Parcial
                                } else {
                                    dynamicStatus = 'active'; // Al día
                                }
                            }

                            // Lógica de Mora (Fechas)
                            const startDate = new Date(l.start_date);
                            const today = new Date();
                            const diffTime = today - startDate;
                            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                            let expectedInstallments = 0;
                            if (l.frequency === 'diario') expectedInstallments = diffDays;
                            else if (l.frequency === 'semanal') expectedInstallments = Math.floor(diffDays / 7);
                            else if (l.frequency === 'quincenal') expectedInstallments = Math.floor(diffDays / 15);
                            else if (l.frequency === 'mensual') expectedInstallments = Math.floor(diffDays / 30);

                            // COHERENCIA FRONT-END: Vincular el préstamo con la línea de crédito por Tasa y Tipo
                            const lineMatch = creditLines.find(cl => Number(cl.rate) === Number(l.interest_rate) && cl.type === l.interest_type);
                            const lineName = lineMatch ? lineMatch.name : (l.nombre_linea_credito || l.line_name || 'Crédito Personalizado');

                            // Calcular próxima fecha de pago si no está definida manualmente
                            let computedNextPayment = l.next_payment_date || null;
                            if (!computedNextPayment && l.start_date) {
                                const start = new Date(l.start_date + 'T12:00:00');
                                const paidCount = l.installments_paid || 0;
                                const nextNum = paidCount + 1;
                                if (l.frequency === 'diario') {
                                    start.setDate(start.getDate() + nextNum);
                                } else if (l.frequency === 'semanal') {
                                    start.setDate(start.getDate() + (nextNum * 7));
                                } else if (l.frequency === 'quincenal') {
                                    start.setDate(start.getDate() + (nextNum * 15));
                                } else { // mensual
                                    start.setMonth(start.getMonth() + nextNum);
                                }
                                computedNextPayment = start.toISOString().split('T')[0];
                            }

                            return {
                                id: l.id,
                                clientId: l.client_id,
                                clientName: l.clients?.name || 'Desconocido',
                                documentId: l.clients?.document_id,
                                lineName: lineName,
                                amount: l.amount,
                                totalPayable: totalPayable,
                                balance: balance,
                                cuotaValue: cuotaValue,
                                totalInstallments: l.installments_total,
                                installmentsPaid: l.installments_paid,
                                frequency: l.frequency,
                                date: l.start_date,
                                nextPaymentDate: computedNextPayment,
                                nextPaymentDateManual: l.next_payment_date || null,
                                status: dynamicStatus,
                                phone: l.clients?.phone_main,
                                address: l.clients?.address,
                                reference: l.clients?.reference_point,
                                interestRate: l.interest_rate
                            };
                        });

                        const totalColocada = mappedLoans.reduce((acc, l) => acc + l.totalPayable, 0);
                        console.log("📊 [fetchData] Sincronización completa:");
                        console.log(`   - Préstamos: ${mappedLoans.length}`);
                        console.log(`   - Cartera Total: ${formatCurrency(totalColocada)}`);

                        setLoans(mappedLoans);
                    }
                } catch (error) {
                    console.error('Error fetching data:', error);
                }
            };

            const refreshDashboardData = async () => {
                console.log("🚀 Iniciando refreshDashboardData()...");
                await fetchData();
                console.log("✅ Métricas sincronizadas con éxito.");
            };

            // Exponer a global para acceso externo/consola
            window.refreshDashboardData = refreshDashboardData;

            // El fetchData ya se llama en el useEffect que vigila [session, activeTab]

            const handleOpenCartulina = (loan) => {
                setSelectedLoanForCartulina(loan);
                setIsCartulinaOpen(true);
            };
            const handleOpenEditLoan = (loan) => {
                setSelectedLoanForEdit(loan);
                setIsEditLoanModalOpen(true);
            };
            const handleDeleteLoan = async (loanId) => {
                if (!confirm('¿Estás seguro de que deseas eliminar este crédito permanentemente? Esta acción borrará también todos los pagos registrados y no se puede deshacer.')) return;
                try {
                    if (supabase) {
                        // 1. Eliminar pagos relacionados (Importante para integridad)
                        const { error: payError } = await supabase.from('payments').delete().eq('loan_id', loanId);
                        if (payError) throw payError;
                        // 2. Eliminar el préstamo
                        const { error: loanError } = await supabase.from('loans').delete().eq('id', loanId).eq('tenant_id', DEFAULT_TENANT_ID);
                        if (loanError) throw loanError;
                        alert('Crédito eliminado exitosamente.');
                    } else {
                        alert('Modo Local: Simulación de eliminación.');
                    }
                    fetchData();
                } catch (error) {
                    console.error('Error al eliminar:', error);
                    alert('Error al eliminar: ' + error.message);
                }
            };
            const handleInactivateLoan = async (loanId) => {
                if (!confirm('¿Deseas inactivar este crédito?')) return;
                try {
                    if (supabase) {
                        const { error } = await supabase.from('loans').update({ status: 'inactive' }).eq('id', loanId).eq('tenant_id', DEFAULT_TENANT_ID);
                        if (error) throw error;
                        alert('Crédito inactivado.');
                    } else {
                        alert('Modo Local: Simulación de inactivación.');
                    }
                    fetchData();
                } catch (error) {
                    console.error('Error al inactivar:', error);
                    alert('Error al inactivar: ' + error.message);
                }
            };

            if (isInitializing) {
                return (
                    <div className="min-h-screen bg-surface flex items-center justify-center">
                        <div className="w-16 h-16 border-4 border-nequi border-t-transparent rounded-full animate-spin"></div>
                    </div>
                );
            }

            if (supabaseInitError) {
                return (
                    <div className="min-h-screen bg-surface flex flex-col items-center justify-center p-6 text-center">
                        <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mb-4">
                            <IconClose className="w-8 h-8" />
                        </div>
                        <h2 className="text-xl font-bold text-gray-900 mb-2">Error de Conexión</h2>
                        <p className="text-gray-500">{supabaseInitError}</p>
                    </div>
                );
            }

            // ── Pantalla de Login ──────────────────────────────────────────────
            if (!isLoggedIn) {
                return (
                    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(135deg,#0f0f13 0%,#1a0a2e 50%,#0f0f13 100%)', padding: 24, fontFamily: 'Inter,sans-serif' }}>
                        <div style={{ width: '100%', maxWidth: 380 }}>
                            {/* Logo / Icono */}
                            <div style={{ textAlign: 'center', marginBottom: 32 }}>
                                <div style={{ width: 72, height: 72, background: 'linear-gradient(135deg,#DA0081,#9333ea)', borderRadius: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 16px', fontSize: 32, boxShadow: '0 8px 32px rgba(218,0,129,0.3)' }}>💰</div>
                                <h1 style={{ fontSize: 24, fontWeight: 800, color: '#f1f5f9', marginBottom: 4 }}>Gestión de Créditos</h1>
                                <p style={{ color: '#6b7280', fontSize: 13 }}>Ingresa con tus credenciales</p>
                            </div>
                            {/* Formulario */}
                            <div style={{ background: '#16161f', border: '1px solid #2a2a3a', borderRadius: 24, padding: 28 }}>
                                <div style={{ marginBottom: 16 }}>
                                    <label style={{ display: 'block', fontSize: 11, fontWeight: 600, color: '#6b7280', textTransform: 'uppercase', letterSpacing: .5, marginBottom: 6 }}>📧 Correo Electrónico</label>
                                    <input type="email" value={loginEmail} onChange={e => setLoginEmail(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && handleLogin()}
                                        placeholder="tu@correo.com"
                                        style={{ width: '100%', padding: '13px 16px', borderRadius: 12, border: '1.5px solid #2a2a3a', background: '#0f0f13', color: '#e2e8f0', fontSize: 15, outline: 'none' }}
                                    />
                                </div>
                                <div style={{ marginBottom: 20 }}>
                                    <label style={{ display: 'block', fontSize: 11, fontWeight: 600, color: '#6b7280', textTransform: 'uppercase', letterSpacing: .5, marginBottom: 6 }}>🔑 Contraseña</label>
                                    <input type="password" value={loginPassword} onChange={e => setLoginPassword(e.target.value)}
                                        onKeyDown={e => e.key === 'Enter' && handleLogin()}
                                        placeholder="••••••••"
                                        style={{ width: '100%', padding: '13px 16px', borderRadius: 12, border: '1.5px solid #2a2a3a', background: '#0f0f13', color: '#e2e8f0', fontSize: 15, outline: 'none', letterSpacing: 2 }}
                                    />
                                </div>
                                {loginError && (
                                    <div style={{ background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 10, padding: '10px 14px', marginBottom: 16 }}>
                                        <p style={{ color: '#ef4444', fontSize: 13, fontWeight: 500 }}>⚠️ {loginError}</p>
                                    </div>
                                )}
                                <button onClick={handleLogin} disabled={loginLoading}
                                    style={{ width: '100%', padding: '14px', borderRadius: 14, border: 'none', background: 'linear-gradient(135deg,#DA0081,#9333ea)', color: '#fff', fontWeight: 700, fontSize: 16, cursor: 'pointer', boxShadow: '0 6px 24px rgba(218,0,129,0.3)', opacity: loginLoading ? .7 : 1, transition: 'opacity .2s' }}>
                                    {loginLoading ? 'Verificando...' : 'Ingresar'}
                                </button>
                            </div>
                            <p style={{ textAlign: 'center', color: '#4b5563', fontSize: 11, marginTop: 16 }}>Solicita tus credenciales al administrador</p>
                        </div>
                    </div>
                );
            }

            // ── Pantalla de Licencia Vencida / Bloqueada ──────────────────────
            if (licenseStatus === 'checking') {
                return (
                    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(135deg,#0f0f13,#1a0a2e)' }}>
                        <div style={{ textAlign: 'center', color: '#9ca3af' }}>
                            <div style={{ width: 48, height: 48, border: '3px solid #DA0081', borderTopColor: 'transparent', borderRadius: '50%', animation: 'spin 1s linear infinite', margin: '0 auto 16px' }}></div>
                            <p style={{ fontFamily: 'Inter,sans-serif', fontSize: 14 }}>Verificando licencia...</p>
                            <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
                        </div>
                    </div>
                );
            }

            if (licenseStatus === 'blocked' || licenseStatus === 'expired') {
                const whatsappMsg = encodeURIComponent('Hola, quiero activar mi licencia nuevamente del programa de organización y control de créditos');
                const whatsappUrl = `https://wa.me/573002397590?text=${whatsappMsg}`;
                return (
                    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(135deg,#0f0f13 0%,#1a0a2e 50%,#0f0f13 100%)', padding: 24, fontFamily: 'Inter,sans-serif' }}>
                        <div style={{ textAlign: 'center', maxWidth: 420, width: '100%' }}>
                            <div style={{ width: 100, height: 100, background: 'linear-gradient(135deg,rgba(218,0,129,0.15),rgba(147,51,234,0.15))', borderRadius: 30, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 28px', border: '2px solid rgba(218,0,129,0.3)' }}>
                                <span style={{ fontSize: 48 }}>🔒</span>
                            </div>
                            <h1 style={{ fontSize: 28, fontWeight: 800, color: '#f1f5f9', marginBottom: 10, lineHeight: 1.2 }}>
                                {licenseStatus === 'expired' ? 'Licencia Vencida' : 'Licencia Suspendida'}
                            </h1>
                            <p style={{ color: '#6b7280', fontSize: 15, lineHeight: 1.6, marginBottom: 36 }}>
                                {licenseStatus === 'expired'
                                    ? 'Tu periodo de licencia ha finalizado. Renueva ahora para seguir gestionando tus créditos sin interrupciones.'
                                    : 'Tu acceso ha sido suspendido temporalmente. Comunícate con nosotros para reactivar tu licencia.'}
                            </p>
                            <a href={whatsappUrl} target="_blank" rel="noopener noreferrer"
                                style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 12, width: '100%', padding: '18px 24px', borderRadius: 20, border: 'none', background: 'linear-gradient(135deg,#25D366,#128C7E)', color: '#fff', fontSize: 17, fontWeight: 700, textDecoration: 'none', cursor: 'pointer', boxShadow: '0 8px 32px rgba(37,211,102,0.3)', transition: 'transform 0.15s,box-shadow 0.15s' }}
                            >
                                <svg width="26" height="26" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z" /></svg>
                                Contáctanos aquí para activar tu licencia
                            </a>
                            <p style={{ color: '#4b5563', fontSize: 12, marginTop: 20 }}>¿Necesitas ayuda? Escríbenos directamente por WhatsApp</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-surface">
                    {/* Main Content Area */}
                    <main className="transition-all duration-300">
                        {activeTab === 'home' && <HomeView loans={loans} onOpenGasto={() => setIsGastoModalOpen(true)} onOpenCobro={() => setIsCobroModalOpen(true)} tenantName={tenantInfo?.business_name || tenantInfo?.owner_name} onLogout={() => { DEFAULT_TENANT_ID = null; setIsLoggedIn(false); setLicenseStatus('checking'); setTenantInfo(null); setLoans([]); setLoginEmail(''); setLoginPassword(''); }} />}
                        {activeTab === 'loans' && <LoansView loans={loans} onOpenCartulina={handleOpenCartulina} onEditLoan={handleOpenEditLoan} onDeleteLoan={handleDeleteLoan} onInactivateLoan={handleInactivateLoan} />}
                        {activeTab === 'reports' && <ReportsView />}
                        {activeTab === 'import' && <CargaMasivaView creditLines={creditLines} onSuccess={refreshDashboardData} />}
                        {activeTab === 'settings' && <SettingsView creditLines={creditLines} setCreditLines={setCreditLines} />}
                    </main>

                    {/* FAB (Floating Action Button) - Siempre Visible */}
                    <button
                        onClick={() => setIsNewLoanModalOpen(true)}
                        className="fixed bottom-24 right-6 w-16 h-16 bg-nequi text-white rounded-full flex items-center justify-center shadow-[0_8px_25px_rgba(218,0,129,0.4)] hover:bg-nequi-dark hover:scale-105 active:scale-95 transition-all z-40"
                    >
                        <IconPlus className="w-7 h-7" />
                    </button>

                    {/* Modals */}
                    <NewLoanModal isOpen={isNewLoanModalOpen} onClose={() => setIsNewLoanModalOpen(false)} creditLines={creditLines} onSuccess={refreshDashboardData} />
                    <EditLoanModal isOpen={isEditLoanModalOpen} onClose={() => setIsEditLoanModalOpen(false)} loan={selectedLoanForEdit} onSuccess={refreshDashboardData} />
                    <CartulinaPagosModal isOpen={isCartulinaOpen} onClose={() => setIsCartulinaOpen(false)} loan={selectedLoanForCartulina} businessName={tenantInfo?.business_name} />
                    <AgregarGastoModal isOpen={isGastoModalOpen} onClose={() => setIsGastoModalOpen(false)} onSuccess={refreshDashboardData} />
                    <RegistrarCobroModal isOpen={isCobroModalOpen} onClose={() => setIsCobroModalOpen(false)} loans={loans} onSuccess={refreshDashboardData} />

                    {/* Bottom Navigation (Mobile First) */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-gray-100 pb-safe shadow-[0_-8px_30px_rgb(0,0,0,0.04)] z-50">
                        <div className="max-w-md mx-auto flex justify-around p-3">
                            <button
                                onClick={() => setActiveTab('home')}
                                className={`flex flex-col items-center p-2 rounded-xl min-w-[64px] transition-all ${activeTab === 'home' ? 'text-nequi' : 'text-gray-400 hover:text-gray-600'}`}
                            >
                                <div className={`transition-transform duration-300 ${activeTab === 'home' ? '-translate-y-1' : ''}`}>
                                    <IconHome className="w-6 h-6" />
                                </div>
                                <span className={`text-[10px] font-medium mt-1 transition-opacity duration-300 ${activeTab === 'home' ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>Inicio</span>
                            </button>

                            <button
                                onClick={() => setActiveTab('loans')}
                                className={`flex flex-col items-center p-2 rounded-xl min-w-[64px] transition-all ${activeTab === 'loans' ? 'text-nequi' : 'text-gray-400 hover:text-gray-600'}`}
                            >
                                <div className={`transition-transform duration-300 ${activeTab === 'loans' ? '-translate-y-1' : ''}`}>
                                    <IconList className="w-6 h-6" />
                                </div>
                                <span className={`text-[10px] font-medium mt-1 transition-opacity duration-300 ${activeTab === 'loans' ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>Préstamos</span>
                            </button>

                            <button
                                onClick={() => setActiveTab('reports')}
                                className={`flex flex-col items-center p-2 rounded-xl min-w-[64px] transition-all ${activeTab === 'reports' ? 'text-nequi' : 'text-gray-400 hover:text-gray-600'}`}
                            >
                                <div className={`transition-transform duration-300 ${activeTab === 'reports' ? '-translate-y-1' : ''}`}>
                                    <IconPieChart className="w-6 h-6" />
                                </div>
                                <span className={`text-[10px] font-medium mt-1 transition-opacity duration-300 ${activeTab === 'reports' ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>Gastos</span>
                            </button>

                            <button
                                onClick={() => setActiveTab('import')}
                                className={`flex flex-col items-center p-2 rounded-xl min-w-[64px] transition-all ${activeTab === 'import' ? 'text-nequi' : 'text-gray-400 hover:text-gray-600'}`}
                            >
                                <div className={`transition-transform duration-300 ${activeTab === 'import' ? '-translate-y-1' : ''}`}>
                                    <IconUploadCloud className="w-6 h-6" />
                                </div>
                                <span className={`text-[10px] font-medium mt-1 transition-opacity duration-300 ${activeTab === 'import' ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>Importar</span>
                            </button>

                            <button
                                onClick={() => setActiveTab('settings')}
                                className={`flex flex-col items-center p-2 rounded-xl min-w-[64px] transition-all ${activeTab === 'settings' ? 'text-nequi' : 'text-gray-400 hover:text-gray-600'}`}
                            >
                                <div className={`transition-transform duration-300 ${activeTab === 'settings' ? '-translate-y-1' : ''}`}>
                                    <IconSettings className="w-6 h-6" />
                                </div>
                                <span className={`text-[10px] font-medium mt-1 transition-opacity duration-300 ${activeTab === 'settings' ? 'opacity-100' : 'opacity-0 h-0 overflow-hidden'}`}>Ajustes</span>
                            </button>
                        </div>
                    </nav>

                    <style jsx="true">{`
                        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
                        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
                        .slide-up-fade { animation: slideUpFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
                        @keyframes fadeIn {
                            from { opacity: 0; transform: translateY(10px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                        @keyframes slideUpFadeIn {
                            from { opacity: 0; transform: translateY(100%); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                        .scrollbar-hide::-webkit-scrollbar {
                            display: none;
                        }
                        .scrollbar-hide {
                            -ms-overflow-style: none;
                            scrollbar-width: none;
                        }
                    `}</style>
                </div>
            );
        };

        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
            console.log("Sistema CaribePOS Iniciado");
        } catch (error) {
            console.error("Error Fatal en la Inicialización de React:", error);
            const rootDiv = document.getElementById('root');
            if (rootDiv) {
                rootDiv.innerHTML = `
                    <div style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f8f9fa; padding: 20px;">
                        <div style="background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 400px; text-align: center; font-family: 'Inter', sans-serif;">
                            <div style="width: 64px; height: 64px; background: #fee2e2; color: #ef4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; font-weight: 900;">!</div>
                            <h2 style="margin: 0 0 10px; color: #111827; font-size: 20px; font-weight: 800;">Error Crítico</h2>
                            <p style="margin: 0; color: #4b5563; font-size: 14px; line-height: 1.5; font-weight: 500;">Ha ocurrido un problema al cargar la aplicación.</p>
                            <p style="margin: 10px 0 0; color: #ef4444; font-size: 13px; line-height: 1.5; background: #fef2f2; padding: 10px; border-radius: 10px;">${error.message}</p>
                            <p style="margin: 20px 0 0; color: #9ca3af; font-size: 12px;">Verifica tu conexión a internet o los bloqueadores de anuncios que puedan estar deteniendo las librerías CDN.</p>
                        </div>
                    </div>
                `;
            }
        }
    </script>
</body>

</html>
