                                            <a href={whatsappLink} target="_blank" rel="noopener noreferrer" style={{ width: 28, height: 28, borderRadius: 6, border: '1px solid #bbf7d0', background: '#dcfce7', color: '#16a34a', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', textDecoration: 'none' }} title="WhatsApp"><IconWhatsApp style={{ width: 14, height: 14 }} /></a>
                                            <div style={{ position: 'relative' }}>
                                                <button onClick={e => { e.stopPropagation(); setOpenMenuId(openMenuId === loan.id ? null : loan.id) }} style={{ width: 28, height: 28, borderRadius: 6, border: '1px solid #e5e7eb', background: '#f9fafb', color: '#9ca3af', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', padding: 0 }} title="Más"><IconDotsVertical style={{ width: 14, height: 14 }} /></button>
                                                {openMenuId === loan.id && (
                                                    <div style={{ position: 'absolute', right: 0, top: 32, width: 190, background: '#fff', borderRadius: 14, boxShadow: '0 12px 40px rgba(0,0,0,0.2)', border: '1px solid #e5e7eb', zIndex: 9999, overflow: 'hidden', touchAction: 'none' }} onClick={e => e.stopPropagation()}>
                                                        <button onClick={e => { e.stopPropagation(); e.preventDefault(); setOpenMenuId(null); onInactivateLoan(loan.id) }} style={{ width: '100%', textAlign: 'left', padding: '12px 16px', fontSize: 13, fontWeight: 600, color: '#6b7280', background: '#fff', border: 'none', borderBottom: '1px solid #f3f4f6', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10 }}><IconPause style={{ width: 15, height: 15 }} /> Inactivar Crédito</button>
                                                        <button onClick={e => { e.stopPropagation(); e.preventDefault(); setOpenMenuId(null); onEditLoan(loan) }} style={{ width: '100%', textAlign: 'left', padding: '12px 16px', fontSize: 13, fontWeight: 600, color: '#2563eb', background: '#fff', border: 'none', borderBottom: '1px solid #f3f4f6', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10 }}><IconEdit style={{ width: 15, height: 15 }} /> Editar Crédito</button>
                                                        <button onClick={e => { e.stopPropagation(); e.preventDefault(); setOpenMenuId(null); onDeleteLoan(loan.id) }} style={{ width: '100%', textAlign: 'left', padding: '12px 16px', fontSize: 13, fontWeight: 600, color: '#dc2626', background: '#fff', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10 }}><svg style={{ width: 15, height: 15 }} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg> Eliminar Crédito</button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                            {sortedLoans.length === 0 && (
                                <div style={{ padding: '40px 20px', textAlign: 'center', color: '#9ca3af', fontSize: 14, background: '#fafafa' }}>
                                    <div style={{ fontSize: 40, marginBottom: 8 }}>📋</div>
                                    No hay préstamos que coincidan con el filtro.
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Módulo de Importación Masiva ---
        const CargaMasivaView = ({ creditLines, onSuccess }) => {
            const [file, setFile] = useState(null);
            const [isDragging, setIsDragging] = useState(false);
            const [dataPreview, setDataPreview] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [importStats, setImportStats] = useState(null);

            const downloadTemplate = () => {
                // Cabeceras CANÓNICAS del sistema (9 campos obligatorios)
                const headers = [
                    'identificacion', 'nombre_cliente', 'telefono', 'direccion',
                    'monto_capital', 'nombre_linea_credito', 'frecuencia_pago',
                    'cuotas_pagadas', 'saldo_restante_actual'
                ];
                const sampleData = [
                    ['12345678', 'Cliente Ejemplo', '3001234567', 'Calle 123', '1000000', 'Línea Estándar 20%', 'mensual', '0', '1200000'],
                    ['87654321', 'Maria Lopez', '3109876543', 'Cra 45', '500000', 'Línea Estándar 20%', 'quincenal', '1', '300000']
                ];

                let csvContent = "data:text/csv;charset=utf-8,"
                    + headers.join(",") + "\n"
                    + sampleData.map(e => e.join(",")).join("\n");

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "plantilla_carga_masiva.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleSimulate = () => {
                const lineaEstandar = creditLines.find(l => l.name === 'Línea Estándar 20%') || creditLines[0];
                const simulation = Array.from({ length: 5 }).map((_, i) => ({
                    'identificacion': `SIM-${1000 + i}`,
                    'nombre_cliente': `Usuario Simulado ${i + 1}`,
                    'telefono': `300${Math.floor(Math.random() * 9000000 + 1000000)}`,
                    'direccion': `Dirección Simulación ${i + 1}`,
                    'monto_capital': 1000000,
                    'nombre_linea_credito': lineaEstandar?.name || 'Línea Estándar 20%',
                    'frecuencia_pago': 'diario',
                    'cuotas_pagadas': 0,
                    'saldo_restante_actual': 1200000
                }));
                setDataPreview(simulation);
                alert('Simulación cargada con 5 créditos. Haz clic en "Iniciar Importación" para guardar.');
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                setIsDragging(true);
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                setIsDragging(false);
            };

            const processFile = (selectedFile) => {
                if (!selectedFile) return;
                setFile(selectedFile);

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const content = e.target.result;
                        let jsonData = [];

                        const requiredHeaders = [
                            'identificacion', 'nombre_cliente', 'telefono', 'direccion',
                            'monto_capital', 'nombre_linea_credito', 'frecuencia_pago',
                            'cuotas_pagadas', 'saldo_restante_actual'
                        ];

                        if (selectedFile.name.endsWith('.csv')) {
                            const lines = content.split('\n');
                            const headers = lines[0].split(',').map(h => h.trim().toLowerCase());

                            // VALIDACIÓN DE CABECERAS
                            const missing = requiredHeaders.filter(h => !headers.includes(h));
                            if (missing.length > 0) {
                                throw new Error(`El archivo CSV no es válido. Faltan las siguientes columnas obligatorias: ${missing.join(', ')}`);
                            }

                            for (let i = 1; i < lines.length; i++) {
                                if (!lines[i].trim()) continue;
                                const values = lines[i].split(',').map(v => v.trim());
                                const obj = {};
                                headers.forEach((header, index) => {
                                    obj[header] = values[index];
                                });
                                jsonData.push(obj);
                            }
                        } else {
                            const data = new Uint8Array(content);
                            const workbook = window.XLSX.read(data, { type: 'array' });
                            const firstSheetName = workbook.SheetNames[0];
                            const worksheet = workbook.Sheets[firstSheetName];
                            jsonData = window.XLSX.utils.sheet_to_json(worksheet);

                            // VALIDACIÓN DE CABECERAS EN EXCEL
                            if (jsonData.length > 0) {
                                const headers = Object.keys(jsonData[0]).map(h => h.trim().toLowerCase());
                                const missing = requiredHeaders.filter(h => !headers.includes(h));
                                if (missing.length > 0) {
                                    throw new Error(`El archivo Excel no es válido. Faltan las siguientes columnas obligatorias: ${missing.join(', ')}`);
                                }
                            }
                        }
                        setDataPreview(jsonData);
                    } catch (err) {
                        alert(err.message);
                        setFile(null);
                        setDataPreview([]);
                    }
                };

                if (selectedFile.name.endsWith('.csv')) {
                    reader.readAsText(selectedFile);
                } else {
                    reader.readAsArrayBuffer(selectedFile);
                }
            };

            const handleDrop = (e) => {
                e.preventDefault();
                setIsDragging(false);
                if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                    processFile(e.dataTransfer.files[0]);
                }
            };

            const handleFileInput = (e) => {
                if (e.target.files && e.target.files.length > 0) {
                    processFile(e.target.files[0]);
                }
            };

            const handleImport = async () => {
                if (dataPreview.length === 0) return;
                setIsLoading(true);
                setImportStats(null);

                try {
                    if (supabase) {
                        let successCount = 0;
                        let errorCount = 0;
                        let errorDetails = [];

                        for (let i = 0; i < dataPreview.length; i++) {
                            const row = dataPreview[i];
                            const rowNum = i + 1;
                            try {
                                const id_num = row['identificacion'];
                                const name = row['nombre_cliente'] || 'Sin Nombre';
                                const phone = String(row['telefono'] || '0000000000');
                                const addr = row['direccion'] || '';
                                const capital = Number(row['monto_capital'] || 0);
                                const linea_nombre = row['nombre_linea_credito'];
                                const freq = row['frecuencia_pago'] || 'mensual';
                                const pagadas = Number(row['cuotas_pagadas'] || 0);
                                const saldo = Number(row['saldo_restante_actual'] || 0);

                                if (!id_num) throw new Error("Falta identificación");
                                if (capital <= 0) throw new Error("Monto de capital debe ser mayor a 0");

                                // 1. Validar Existencia de Línea (Regla de Oro)
                                const line = creditLines.find(l => l.name === linea_nombre);
                                if (!line) {
                                    throw new Error(`La línea [${linea_nombre || 'S/N'}] no está configurada en el sistema.`);
                                }

                                // 2. Upsert Client
                                let clientId;
                                const { data: existingClient } = await supabase
                                    .from('clients')
                                    .select('id')
                                    .eq('tenant_id', DEFAULT_TENANT_ID)
                                    .eq('document_id', String(id_num))
                                    .maybeSingle();

                                if (existingClient) {
                                    clientId = existingClient.id;
                                } else {
                                    const { data: newClient, error: clientErr } = await supabase
                                        .from('clients')
                                        .insert({
                                            tenant_id: DEFAULT_TENANT_ID,
                                            name,
                                            document_id: String(id_num),
                                            phone_main: phone,
                                            address: addr
                                        })
                                        .select('id')
                                        .single();
                                    if (clientErr) throw clientErr;
                                    clientId = newClient.id;
                                }

                                // 3. Calcular cuotas totales basado en frecuencia
                                const freqMultiplier = { mensual: 1, quincenal: 2, semanal: 4, diario: 30 };
                                const total_cuotas = freqMultiplier[freq] || 1;

                                // 4. Insert Loan
                                const { error: loanErr } = await supabase
                                    .from('loans')
                                    .insert({
                                        tenant_id: DEFAULT_TENANT_ID,
                                        client_id: clientId,
                                        amount: capital,
                                        interest_rate: line.rate,
                                        interest_type: line.type || 'simple',
                                        frequency: freq,
                                        installments_total: total_cuotas,
                                        installments_paid: pagadas,
                                        // Integridad de Carga Histórica: Usar saldo_restante_actual si existe, sino calcular
                                        balance: saldo !== undefined && saldo !== null ? Number(saldo) : Math.round(capital * (1 + line.rate / 100)),
                                        start_date: new Date().toISOString().split('T')[0],
                                        status: (saldo !== undefined && Number(saldo) <= 0) || (pagadas >= total_cuotas) ? 'completed' : 'active'
                                    });

                                if (loanErr) throw loanErr;
                                successCount++;
                            } catch (e) {
                                console.error(`Error en fila ${rowNum}`, row, e);
                                errorCount++;
                                errorDetails.push({ row: rowNum, message: e.message || "Error desconocido" });
                            }
                        }

                        setImportStats({ success: successCount, error: errorCount, details: errorDetails });

                        // --- Sincronización del Dashboard ---
                        if (successCount > 0 && onSuccess) {
                            console.log(`Importación finalizada con éxito (${successCount} registros). Disparando actualización de Dashboard...`);
                            await onSuccess();
                        }
                    } else {
                        alert('Modo Local: Supabase no detectado.');
                    }
                } catch (error) {
                    console.error('Error importing data:', error);
                    alert('Hubo un error crítico en la importación masiva.');
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="p-6 pb-24 max-w-2xl mx-auto fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold text-gray-900">Carga Masiva</h2>
                        <div className="flex gap-2">
                            <button
                                onClick={downloadTemplate}
                                className="text-xs font-bold text-nequi hover:underline flex items-center gap-1"
                            >
                                <IconDownload className="w-3 h-3" /> Descargar Plantilla
                            </button>
                            <button
                                onClick={handleSimulate}
                                className="text-xs font-bold text-blue-600 hover:underline flex items-center gap-1"
                            >
                                <IconPlay className="w-3 h-3" /> Simular Carga
                            </button>
                        </div>
                    </div>

                    <div
                        onDragOver={handleDragOver}
                        onDragLeave={handleDragLeave}
                        onDrop={handleDrop}
                        className={`w-full border-2 border-dashed rounded-3xl p-10 flex flex-col items-center justify-center gap-4 transition-all ${isDragging ? 'border-nequi bg-nequi-light/20' : 'border-gray-200 bg-white hover:bg-gray-50'}`}
                    >
                        <div className={`w-16 h-16 rounded-full flex items-center justify-center ${isDragging ? 'bg-nequi text-white' : 'bg-gray-100 text-gray-400'}`}>
                            <IconUploadCloud className="w-8 h-8" />
                        </div>
                        <div className="text-center">
                            <h3 className="font-bold text-gray-900 text-lg mb-1">Sube tu archivo de cartera</h3>
                            <p className="text-sm text-gray-500 mb-4">Soporta formatos .xlsx y .csv</p>

                            <label className="bg-white border border-gray-200 text-gray-700 font-bold py-2.5 px-6 rounded-xl shadow-sm hover:bg-gray-50 cursor-pointer active:scale-95 transition-all inline-block">
                                Explorar Archivos
                                <input type="file" accept=".xlsx, .csv" onChange={handleFileInput} className="hidden" />
                            </label>
                        </div>
                    </div>

                    {dataPreview.length > 0 && (
                        <div className="mt-8 bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 overflow-hidden fade-in">
                            <div className="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                                <h3 className="font-bold text-gray-800">Vista Previa ({dataPreview.length} filas)</h3>
                                <button
                                    onClick={handleImport}
                                    disabled={isLoading}
                                    className="bg-nequi text-white font-bold py-2 px-4 rounded-xl text-sm hover:bg-nequi-dark transition-colors disabled:opacity-50"
                                >
                                    {isLoading ? 'Importando...' : 'Iniciar Importación'}
                                </button>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left text-sm whitespace-nowrap">
                                    <thead className="text-xs text-gray-500 uppercase bg-gray-50/50">
                                        <tr>
                                            {Object.keys(dataPreview[0] || {}).map(key => (
                                                <th key={key} className="px-4 py-3">{key}</th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {dataPreview.slice(0, 5).map((row, idx) => (
                                            <tr key={idx} className="border-b border-gray-50 hover:bg-gray-50/50">
                                                {Object.values(row).map((val, i) => (
                                                    <td key={i} className="px-4 py-3 text-gray-700">{String(val)}</td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                {dataPreview.length > 5 && (
                                    <div className="p-3 text-center text-xs text-gray-500 bg-gray-50/50">
                                        Mostrando 5 de {dataPreview.length} filas
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {importStats && (
                        <div className={`mt-6 p-6 rounded-3xl border fade-in ${importStats.error > 0 ? 'bg-red-50 border-red-100' : 'bg-green-50 border-green-100'}`}>
                            <h4 className={`font-bold mb-4 flex items-center gap-2 ${importStats.error > 0 ? 'text-red-800' : 'text-green-800'}`}>
                                {importStats.error > 0 ? <IconClose className="w-5 h-5" /> : <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>}
                                Resumen de Importación
                            </h4>
                            <div className="grid grid-cols-2 gap-4 mb-4">
                                <div className="bg-white/50 p-3 rounded-2xl">
                                    <p className="text-[10px] uppercase font-bold text-gray-500 tracking-wider">Exitosos</p>
                                    <p className="text-2xl font-black text-gray-900">{importStats.success}</p>
                                </div>
                                <div className="bg-white/50 p-3 rounded-2xl">
                                    <p className="text-[10px] uppercase font-bold text-gray-500 tracking-wider">Errores</p>
                                    <p className="text-2xl font-black text-red-600">{importStats.error}</p>
                                </div>
                            </div>

                            {importStats.details && importStats.details.length > 0 && (
                                <div className="mt-4 pt-4 border-t border-red-100">
                                    <p className="text-xs font-bold text-red-800 mb-2 uppercase">Detalle de Errores:</p>
                                    <div className="max-h-40 overflow-y-auto space-y-1 pr-2 custom-scrollbar">
                                        {importStats.details.map((err, i) => (
                                            <p key={i} className="text-xs text-red-600 bg-red-100/50 p-2 rounded-lg">
                                                <strong>Fila {err.row}:</strong> {err.message}
                                            </p>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        // --- Modal Crear Línea de Crédito ---

        const CrearLineaModal = ({ isOpen, onClose, onSaved }) => {
            const [name, setName] = useState('');
            const [rate, setRate] = useState(20);
            const [type, setType] = useState('simple');
            const [isLoading, setIsLoading] = useState(false);

            // Preview de cálculo con $1.000.000 a 12 cuotas
            const previewMonto = 1000000;
            const previewCuotas = 12;
            const previewTotal = type === 'simple'
                ? previewMonto * (1 + rate / 100)
                : previewMonto * Math.pow(1 + rate / 100, previewCuotas);
            const previewCuota = previewTotal / previewCuotas;
            const previewIntereses = previewTotal - previewMonto;

            useEffect(() => {
                if (isOpen) {
                    setName('');
                    setRate(20);
                    setType('simple');
                }
            }, [isOpen]);

            const handleSave = async () => {
                if (!name || !rate) {
                    alert('Por favor completa el nombre y la tasa.');
                    return;
                }
                setIsLoading(true);
                try {
                    if (supabase) {
                        const { error } = await supabase
                            .from('credit_lines')
                            .insert({
                                tenant_id: DEFAULT_TENANT_ID,
                                name,
                                interest_rate: Number(rate),
                                interest_type: type
                            });
                        if (error) throw error;
                        alert(`Línea "${name}" creada exitosamente.`);
                    }
                    if (onSaved) onSaved();
                    onClose();
                } catch (err) {
                    alert('Error al guardar: ' + (err.message || err.details));
                } finally {
                    setIsLoading(false);
                }
            };

            if (!isOpen) return null;
            return (
                <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, zIndex: 9999 }}>
                    {/* Fondo oscuro */}
                    <div onClick={onClose} style={{ position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.5)', backdropFilter: 'blur(4px)' }} />
                    {/* Contenedor con scroll — clickear fuera cierra */}
                    <div onClick={onClose}
                        style={{ position: 'absolute', top: 0, left: 0, right: 0, bottom: 0, overflowY: 'auto', paddingTop: '56px', paddingBottom: '24px', paddingLeft: '12px', paddingRight: '12px', boxSizing: 'border-box' }}>
                        {/* Panel — clickear adentro NO cierra */}
                        <div onClick={e => e.stopPropagation()}
                            style={{ maxWidth: '460px', margin: '0 auto', background: '#fff', borderRadius: '24px', boxShadow: '0 24px 60px rgba(0,0,0,0.25)', overflow: 'hidden' }}>

                            {/* Header */}
                            <div style={{ padding: '18px 22px', borderBottom: '1px solid #f1f5f9', display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: '#fff' }}>
                                <h3 style={{ fontSize: '17px', fontWeight: 800, color: '#111827', margin: 0 }}>Nueva Línea de Crédito</h3>
                                <button onClick={onClose} style={{ width: 34, height: 34, borderRadius: '50%', background: '#f1f5f9', border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                                    <IconClose className="w-4 h-4" />
                                </button>
                            </div>

                            {/* Body */}
                            <div style={{ padding: '20px 22px', display: 'flex', flexDirection: 'column', gap: '18px' }}>
                                {/* Nombre */}
                                <div>
                                    <label style={{ display: 'block', fontSize: '11px', fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '8px' }}>Nombre de la Línea</label>
                                    <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="Ej. Microcrédito Express"
                                        style={{ width: '100%', background: '#f8fafc', border: '2px solid transparent', borderRadius: '14px', padding: '13px 16px', fontSize: '15px', fontWeight: 600, color: '#111827', outline: 'none', boxSizing: 'border-box' }}
                                        onFocus={e => e.target.style.borderColor = '#DA0081'} onBlur={e => e.target.style.borderColor = 'transparent'}
                                    />
                                </div>
                                {/* Tipo */}
                                <div>
                                    <label style={{ display: 'block', fontSize: '11px', fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '8px' }}>Tipo de Interés</label>
                                    <div style={{ display: 'flex', background: '#f8fafc', padding: '4px', borderRadius: '14px', gap: '4px' }}>
                                        {[{ v: 'simple', l: 'Simple' }, { v: 'compuesto', l: 'Compuesto' }].map(opt => (
                                            <button key={opt.v} onClick={() => setType(opt.v)}
                                                style={{ flex: 1, padding: '10px', borderRadius: '10px', border: 'none', cursor: 'pointer', fontSize: '14px', fontWeight: 700, background: type === opt.v ? '#fff' : 'transparent', color: type === opt.v ? '#111827' : '#9ca3af', boxShadow: type === opt.v ? '0 1px 4px rgba(0,0,0,0.1)' : 'none', transition: 'all 0.2s' }}>
                                                {opt.l}
                                            </button>
                                        ))}
                                    </div>
                                    <p style={{ fontSize: '11px', color: '#9ca3af', marginTop: '6px', lineHeight: '1.5' }}>
                                        {type === 'simple' ? '📐 Simple: Interés se aplica una sola vez sobre el capital.' : '📈 Compuesto: Se capitaliza cada período, genera más costo total.'}
                                    </p>
                                </div>
                                {/* Tasa */}
                                <div>
                                    <label style={{ display: 'block', fontSize: '11px', fontWeight: 700, color: '#6b7280', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: '8px' }}>Tasa de Interés</label>
                                    <div style={{ position: 'relative' }}>
                                        <input type="number" value={rate} onChange={e => setRate(Number(e.target.value))} min={0} max={200} step={0.5}
                                            style={{ width: '100%', background: '#f8fafc', border: '2px solid transparent', borderRadius: '14px', padding: '14px 48px 14px 16px', fontSize: '30px', fontWeight: 900, color: '#111827', outline: 'none', boxSizing: 'border-box' }}
                                            onFocus={e => e.target.style.borderColor = '#DA0081'} onBlur={e => e.target.style.borderColor = 'transparent'}
                                        />
                                        <span style={{ position: 'absolute', right: '16px', top: '50%', transform: 'translateY(-50%)', fontSize: '22px', fontWeight: 700, color: '#9ca3af' }}>%</span>
                                    </div>
                                </div>
                                {/* Preview */}
                                <div style={{ background: 'linear-gradient(135deg,#fce7f3,#fdf2f8)', borderRadius: '14px', padding: '16px', border: '1px solid rgba(218,0,129,0.12)' }}>
                                    <p style={{ fontSize: '11px', fontWeight: 700, color: '#DA0081', textTransform: 'uppercase', letterSpacing: '0.05em', margin: '0 0 12px' }}>Vista Previa — $1.000.000 · 12 cuotas</p>
                                    {[{ l: 'Valor Cuota', v: formatCurrency(previewCuota), c: '#111827', b: false }, { l: 'Total Intereses', v: formatCurrency(previewIntereses), c: '#DA0081', b: false }, { l: 'Total a Pagar', v: formatCurrency(previewTotal), c: '#111827', b: true }].map((r, i) => (
                                        <div key={i} style={{ display: 'flex', justifyContent: 'space-between', paddingTop: i === 2 ? '10px' : 0, borderTop: i === 2 ? '1px solid rgba(218,0,129,0.15)' : 'none', marginTop: i === 2 ? '10px' : 0, marginBottom: i < 2 ? '8px' : 0 }}>
                                            <span style={{ fontSize: '13px', color: '#4b5563', fontWeight: r.b ? 700 : 400 }}>{r.l}</span>
                                            <span style={{ fontSize: '13px', color: r.c, fontWeight: r.b ? 900 : 700 }}>{r.v}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Footer */}
                            <div style={{ padding: '12px 22px 24px', borderTop: '1px solid #f1f5f9' }}>
                                <button onClick={handleSave} disabled={isLoading}
                                    style={{ width: '100%', background: isLoading ? '#e5e7eb' : '#DA0081', color: '#fff', border: 'none', borderRadius: '14px', padding: '16px', fontSize: '16px', fontWeight: 800, cursor: isLoading ? 'not-allowed' : 'pointer', boxShadow: '0 8px 20px rgba(218,0,129,0.3)' }}>
                                    {isLoading ? 'Guardando...' : 'Crear Línea de Crédito'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // 3. Settings View

        const SettingsView = ({ creditLines, setCreditLines }) => {
            const [isCrearLineaOpen, setIsCrearLineaOpen] = useState(false);
            const [expandedLine, setExpandedLine] = useState(null);

            const handleLineSaved = async () => {
                // Recargar líneas desde Supabase
                if (!supabase) return;
                const { data } = await supabase.from('credit_lines').select('*').eq('tenant_id', DEFAULT_TENANT_ID);
                if (data) setCreditLines(data.map(c => ({ id: c.id, name: c.name, rate: c.interest_rate, type: c.interest_type })));
            };

            const handleDeleteLine = async (lineId, lineName) => {
                if (!confirm(`¿Eliminar la línea "${lineName}"?`)) return;
                if (!supabase) return;
                const { error } = await supabase.from('credit_lines').delete().eq('id', lineId).eq('tenant_id', DEFAULT_TENANT_ID);
                if (error) { alert('Error al eliminar: ' + error.message); return; }
                setCreditLines(prev => prev.filter(l => l.id !== lineId));
            };

            // Calcular preview para cada línea
            const getPreview = (line, monto = 1000000, cuotas = 12) => {
                const total = line.type === 'simple'
                    ? monto * (1 + line.rate / 100)
                    : monto * Math.pow(1 + line.rate / 100, cuotas);
                return {
                    cuota: total / cuotas,
                    total,
                    intereses: total - monto
                };
            };

            return (
                <div className="p-6 pb-24 max-w-md mx-auto fade-in">
                    <h2 className="text-2xl font-bold text-gray-900 mb-6">Ajustes</h2>

                    {/* Líneas de Crédito */}
                    <div className="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 overflow-hidden">
                        <div className="flex justify-between items-center p-6 pb-4">
                            <div>
                                <h3 className="font-bold text-gray-900">Mis Líneas de Crédito</h3>
                                <p className="text-xs text-gray-500 mt-0.5">{creditLines.length} líneas configuradas</p>
                            </div>
                            <button
                                onClick={() => setIsCrearLineaOpen(true)}
                                className="flex items-center gap-1.5 bg-nequi text-white font-bold px-4 py-2 rounded-xl text-sm shadow-[0_4px_12px_rgba(218,0,129,0.3)] hover:bg-nequi-dark active:scale-95 transition-all"
                            >
                                <IconPlus className="w-4 h-4" />
                                Nueva
                            </button>
                        </div>

                        <div className="divide-y divide-gray-50">
                            {creditLines.length === 0 && (
                                <div className="p-8 text-center text-gray-400 text-sm">
                                    No tienes líneas de crédito aún.<br />
                                    <span className="font-bold text-nequi">Crea tu primera línea</span> para empezar.
                                </div>
                            )}
                            {creditLines.map(line => {
                                const prev = getPreview(line);
                                const isExpanded = expandedLine === line.id;
                                return (
                                    <div key={line.id} className="transition-all">
                                        <button
                                            className="w-full p-5 flex justify-between items-center hover:bg-gray-50 transition-colors text-left"
                                            onClick={() => setExpandedLine(isExpanded ? null : line.id)}
                                        >
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 rounded-2xl bg-nequi-light flex items-center justify-center">
                                                    <IconBanknote className="w-5 h-5 text-nequi" />
                                                </div>
                                                <div>
                                                    <div className="flex items-center gap-2">
                                                        <h4 className="font-bold text-gray-900 text-sm">{line.name}</h4>
                                                        <span className={`px-2 py-0.5 text-[10px] rounded-full font-bold uppercase ${line.type === 'compuesto' ? 'bg-orange-100 text-orange-700' : 'bg-blue-100 text-blue-700'}`}>
                                                            {line.type === 'simple' ? 'Simple' : 'Compuesto'}
                                                        </span>
                                                    </div>
                                                    <p className="text-xs text-gray-500 mt-0.5">Tasa: <span className="font-bold text-nequi">{line.rate}%</span></p>
                                                </div>
                                            </div>
                                            <IconChevronDown className={`w-4 h-4 text-gray-400 transition-transform ${isExpanded ? 'rotate-180' : ''}`} />
                                        </button>

                                        {isExpanded && (
                                            <div className="px-5 pb-5 bg-gray-50/50 fade-in">
                                                <p className="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-3">Simulación con $1.000.000 a 12 cuotas</p>
                                                <div className="bg-white rounded-2xl p-4 space-y-2.5 border border-gray-100">
                                                    <div className="flex justify-between text-sm">
                                                        <span className="text-gray-500">Valor Cuota</span>
                                                        <span className="font-bold text-gray-900">{formatCurrency(prev.cuota)}</span>
                                                    </div>
                                                    <div className="flex justify-between text-sm">
                                                        <span className="text-gray-500">Total Intereses</span>
                                                        <span className="font-bold text-nequi">{formatCurrency(prev.intereses)}</span>
                                                    </div>
                                                    <div className="flex justify-between text-sm border-t border-gray-50 pt-2.5">
                                                        <span className="text-gray-700 font-bold">Monto Final</span>
                                                        <span className="font-extrabold text-gray-900">{formatCurrency(prev.total)}</span>
                                                    </div>
                                                </div>
                                                <button
                                                    onClick={() => handleDeleteLine(line.id, line.name)}
                                                    className="mt-3 w-full py-2.5 rounded-xl border border-red-100 text-red-500 text-sm font-bold hover:bg-red-50 transition-colors active:scale-95"
                                                >
                                                    Eliminar Línea
                                                </button>
                                            </div>
                                        )}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <CrearLineaModal
                        isOpen={isCrearLineaOpen}
                        onClose={() => setIsCrearLineaOpen(false)}
                        onSaved={handleLineSaved}
                    />
                </div>
            );
        };

        // --- Modals de Transacción ---
        const AgregarGastoModal = ({ isOpen, onClose, onSuccess }) => {
            const categories = [
                { id: 'transporte', name: 'Transporte', icon: IconCar },
                { id: 'alimentacion', name: 'Comida', icon: IconCoffee },
                { id: 'comunicaciones', name: 'Datos', icon: IconSmartphone },
                { id: 'otros', name: 'Otros', icon: IconMoreHorizontal }
            ];
            const [selectedCategory, setSelectedCategory] = useState('transporte');
            const [amount, setAmount] = useState('');
            const [description, setDescription] = useState('');
            const [fechaGasto, setFechaGasto] = useState(new Date().toISOString().split('T')[0]);
            const [isLoading, setIsLoading] = useState(false);

            // Reset al abrir
            useEffect(() => {
                if (isOpen) {
                    setSelectedCategory('transporte');
                    setAmount('');
                    setDescription('');
                    setFechaGasto(new Date().toISOString().split('T')[0]);
                }
            }, [isOpen]);

            const handleSaveExpense = async () => {
                if (!amount) { alert('Ingresa el valor del gasto.'); return; }
                if (!fechaGasto) { alert('Selecciona la fecha del gasto.'); return; }
                setIsLoading(true);
                try {
                    if (supabase) {
                        const { error } = await supabase
                            .from('expenses')
                            .insert({
                                tenant_id: DEFAULT_TENANT_ID,
                                category: selectedCategory,
                                amount: Number(amount),
                                description: description || null,
                                fecha_gasto: fechaGasto
                            });
                        if (error) throw error;
                        alert('✅ Gasto guardado exitosamente.');
                    } else {
                        alert('Modo Local: Gasto simulado.');
                    }
                    if (onSuccess) onSuccess();
                    onClose();
                } catch (error) {
                    console.error('Error guardando gasto:', error);
                    alert('Error al guardar gasto: ' + (error.message || 'Error desconocido'));
                } finally {
                    setIsLoading(false);
                }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 sm:p-0">
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
                    <div className="bg-white w-full sm:max-w-sm rounded-t-[30px] sm:rounded-[30px] shadow-2xl z-10 relative overflow-hidden flex flex-col slide-up-fade">
                        <div className="px-6 py-5 border-b border-gray-50 flex justify-between items-center bg-white sticky top-0 z-20">
                            <h3 className="text-lg font-bold text-gray-900">Agregar Gasto</h3>
                            <button onClick={onClose} className="p-2 bg-gray-50 text-gray-400 hover:text-gray-600 rounded-full transition-colors">
                                <IconClose className="w-5 h-5" />
                            </button>
                        </div>
                        <div className="p-6 overflow-y-auto space-y-5">
                            {/* Fecha del Gasto */}
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">📅 Fecha del Gasto <span className="text-red-500">*</span></label>
                                <input
                                    type="date"
                                    value={fechaGasto}
                                    onChange={e => setFechaGasto(e.target.value)}
                                    max={new Date().toISOString().split('T')[0]}
                                    className="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl py-3.5 px-4 text-sm font-semibold text-gray-900 focus:ring-2 focus:ring-nequi focus:border-nequi outline-none transition-all"
                                    style={{ colorScheme: 'light', minHeight: 48 }}
                                />
                                <p className="text-[10px] text-gray-400 mt-1">Puedes registrar gastos de días anteriores</p>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">Valor</label>
                                <div className="relative">
                                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-xl font-bold text-gray-400">$</span>
                                    <input type="number" value={amount} onChange={e => setAmount(e.target.value)} placeholder="0" className="w-full bg-gray-50 border-0 rounded-2xl py-4 pl-8 pr-4 text-2xl font-black text-gray-900 focus:ring-2 focus:ring-nequi outline-none transition-all" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">Categoría</label>
                                <div className="grid grid-cols-4 gap-2">
                                    {categories.map(cat => {
                                        const isSelected = selectedCategory === cat.id;
                                        return (
                                            <button key={cat.id} onClick={() => setSelectedCategory(cat.id)}
                                                className={`flex flex-col items-center justify-center gap-1.5 p-3 rounded-2xl border transition-all ${isSelected ? 'border-nequi bg-nequi-light/20 text-nequi' : 'border-gray-100 bg-white text-gray-500 hover:bg-gray-50'}`}
                                            >
                                                <cat.icon className="w-6 h-6" />
                                                <span className="text-[10px] font-bold">{cat.name}</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">Descripción</label>
                                <input type="text" value={description} onChange={e => setDescription(e.target.value)} placeholder="Ej. Gasolina moto" className="w-full bg-gray-50 border-0 rounded-2xl py-3.5 px-4 text-sm text-gray-900 focus:ring-2 focus:ring-nequi outline-none transition-all" />
                            </div>
                        </div>
                        <div className="p-6 border-t border-gray-50 bg-white sticky bottom-0 z-20">
                            <button onClick={handleSaveExpense} disabled={isLoading}
                                className="w-full bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-[0_8px_20px_rgba(0,0,0,0.1)] active:scale-[0.98] transition-all disabled:opacity-70 disabled:cursor-not-allowed"
                            >
                                {isLoading ? 'Guardando...' : 'Guardar Gasto'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const RegistrarCobroModal = ({ isOpen, onClose, loans, onSuccess }) => {
            const [tipo, setTipo] = useState('cuota');
            const [medio, setMedio] = useState('efectivo');
            const [selectedLoanId, setSelectedLoanId] = useState('');
            const [amount, setAmount] = useState('');
            const [receiptFile, setReceiptFile] = useState(null);
            const [fechaCobro, setFechaCobro] = useState(new Date().toISOString().split('T')[0]);
            const [isLoading, setIsLoading] = useState(false);

            // Reset al abrir
            useEffect(() => {
                if (isOpen) {
                    setTipo('cuota');
                    setMedio('efectivo');
                    setSelectedLoanId('');
                    setAmount('');
                    setReceiptFile(null);
                    setFechaCobro(new Date().toISOString().split('T')[0]);
                }
            }, [isOpen]);

            const handleFileChange = (e) => {
                if (e.target.files && e.target.files[0]) {
                    setReceiptFile(e.target.files[0]);
                }
            };

            const handlePayment = async () => {
                if (!selectedLoanId || !amount) {
                    alert('Por favor selecciona un cliente y un monto.');
                    return;
                }

                setIsLoading(true);

                try {
                    // Obtener el préstamo seleccionado para cálculos
                    const loan = loans.find(l => l.id === selectedLoanId);
                    if (!loan) throw new Error('Préstamo no encontrado');

                    const amountNum = Number(amount);
                    const cuotaVal = loan.cuotaValue || 0;

                    // Calcular cuántas cuotas cubre el pago
                    const cuotasCubiertas = cuotaVal > 0 ? Math.floor(amountNum / cuotaVal) : 0;
                    const nuevasPagadas = Math.min(
                        loan.installmentsPaid + cuotasCubiertas,
                        loan.totalInstallments
                    );
                    const nuevoBalance = Math.max(loan.balance - amountNum, 0);
                    const nuevoStatus = nuevoBalance <= 0.01 ? 'completed' : 'active';

                    if (supabase) {
                        // 1. Insertar el pago con fecha personalizada
                        const paymentData = {
                            tenant_id: DEFAULT_TENANT_ID,
                            loan_id: selectedLoanId,
                            amount: amountNum
                        };
                        // Usar fecha personalizada si es diferente a hoy
                        if (fechaCobro) {
                            paymentData.created_at = new Date(fechaCobro + 'T12:00:00').toISOString();
                        }
                        const { error: paymentError } = await supabase
                            .from('payments')
                            .insert(paymentData);
                        if (paymentError) throw paymentError;

                        // 2. Actualizar el préstamo con nuevo balance e installments_paid
                        const { error: loanUpdateError } = await supabase
                            .from('loans')
                            .update({
                                installments_paid: nuevasPagadas,
                                balance: nuevoBalance,
                                status: nuevoStatus
                            })
                            .eq('id', selectedLoanId);
                        if (loanUpdateError) throw loanUpdateError;

                        const msgCuotas = cuotasCubiertas > 0
                            ? `\n✔ ${cuotasCubiertas} cuota(s) marcadas como pagadas.`
                            : '';
                        const msgBalance = `\n💰 Saldo restante: ${formatCurrency(nuevoBalance)}`;
                        alert(`¡Cobro registrado exitosamente!${msgCuotas}${msgBalance}`);
                    } else {
                        alert('Modo Local: Cobro simulado.');
                    }

                    if (onSuccess) onSuccess();
                    onClose();

                } catch (error) {
                    console.error('Error registrando pago:', error);
                    alert('Hubo un error al registrar el ingreso.');
                } finally {
                    setIsLoading(false);
                }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center sm:p-4">
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
                    <div className="bg-white w-full sm:max-w-md rounded-t-[40px] sm:rounded-[40px] shadow-2xl z-10 relative overflow-hidden flex flex-col h-[92vh] sm:h-auto sm:max-h-[90vh] slide-up-fade">

                        {/* Header con Icono de Billetes */}
                        <div className="bg-white px-6 pt-8 pb-6 relative text-center border-b border-gray-50 shrink-0">
                            <button onClick={onClose} className="absolute top-6 right-6 p-2 bg-gray-50 text-gray-400 hover:text-gray-600 rounded-full transition-colors">
                                <IconClose className="w-5 h-5" />
                            </button>
                            <div className="w-20 h-20 rounded-full bg-nequi-light/50 mx-auto flex items-center justify-center mb-4 relative">
                                <div className="absolute inset-0 bg-nequi/10 rounded-full animate-ping opacity-50"></div>
                                <IconBanknote className="w-10 h-10 text-nequi" />
                            </div>
                            <h3 className="text-2xl font-extrabold text-gray-900">Registrar Ingreso</h3>
                            <p className="text-sm text-gray-500 mt-1">Añade un pago de un cliente</p>
                        </div>

                        {/* Formulario Fluido */}
                        <div className="p-6 overflow-y-auto flex-1 space-y-5">
                            {/* Fecha del Cobro */}
                            <div>
                                <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">📅 Fecha del Cobro</label>
                                <input
                                    type="date"
                                    value={fechaCobro}
                                    onChange={e => setFechaCobro(e.target.value)}
                                    max={new Date().toISOString().split('T')[0]}
                                    className="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl py-3 px-4 text-sm font-semibold text-gray-900 focus:ring-2 focus:ring-nequi focus:border-nequi outline-none transition-all"
                                    style={{ colorScheme: 'light', minHeight: 46 }}
                                />
                                <p className="text-[10px] text-gray-400 mt-1">Permite registrar cobros retroactivos</p>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">1. Cliente a Pagar</label>
                                <select
                                    value={selectedLoanId}
                                    onChange={(e) => setSelectedLoanId(e.target.value)}
                                    className="w-full bg-gray-50 border-0 rounded-2xl py-4 px-4 text-sm font-bold text-gray-900 focus:ring-2 focus:ring-nequi outline-none appearance-none"
                                >
                                    <option value="">Selecciona un cliente...</option>
                                    {loans.map(l => <option key={l.id} value={l.id}>{l.clientName} — Saldo: {formatCurrency(l.balance || 0)}</option>)}
                                </select>

                                {/* Resumen del préstamo seleccionado */}
                                {selectedLoanId && (() => {
                                    const loan = loans.find(l => l.id === selectedLoanId);
                                    if (!loan) return null;
                                    const cuotasPendientes = loan.totalInstallments - loan.installmentsPaid;
                                    return (
                                        <div className="mt-3 p-4 rounded-2xl bg-nequi-light/30 border border-nequi/10">
                                            <div className="flex justify-between text-sm mb-1.5">
                                                <span className="text-gray-600">Valor próxima cuota</span>
                                                <span className="font-extrabold text-gray-900">{formatCurrency(loan.cuotaValue || 0)}</span>
                                            </div>
                                            <div className="flex justify-between text-sm mb-1.5">
                                                <span className="text-gray-600">Cuotas pendientes</span>
                                                <span className="font-bold text-gray-700">{cuotasPendientes} de {loan.totalInstallments}</span>
                                            </div>
                                            <div className="flex justify-between text-sm border-t border-nequi/10 pt-2 mt-2">
                                                <span className="font-bold text-gray-700">Saldo restante</span>
                                                <span className="font-extrabold text-nequi">{formatCurrency(loan.balance || 0)}</span>
                                            </div>
                                        </div>
                                    );
                                })()}

                            </div>

                            <div>
                                <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">2. Monto Recibido</label>
                                <div className="relative">
                                    <span className="absolute left-6 top-1/2 -translate-y-1/2 text-3xl font-black text-gray-400">$</span>
                                    <input
                                        type="number"
                                        value={amount}
                                        onChange={(e) => setAmount(e.target.value)}
                                        placeholder="0"
                                        className="w-full bg-gray-50 border-0 rounded-[32px] py-6 pl-14 pr-6 text-4xl font-black text-gray-900 focus:ring-2 focus:ring-nequi outline-none transition-all placeholder:text-gray-300"
                                    />
                                </div>
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">3. Tipo de Pago</label>
                                <div className="flex bg-gray-50 p-1 rounded-2xl">
                                    {['cuota', 'abono', 'cancelacion'].map(t => (
                                        <button
                                            key={t}
                                            onClick={() => setTipo(t)}
                                            className={`flex-1 py-2.5 text-xs font-bold rounded-xl capitalize transition-all ${tipo === t ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500 hover:text-gray-700'}`}
                                        >
                                            {t === 'cancelacion' ? 'Total' : t}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">4. Medio de Pago</label>
                                <div className="flex bg-gray-50 p-1 rounded-2xl">
                                    {['efectivo', 'transferencia', 'pse'].map(m => (
                                        <button
                                            key={m}
                                            onClick={() => setMedio(m)}
                                            className={`flex-1 py-2.5 text-xs font-bold rounded-xl capitalize transition-all ${medio === m ? 'bg-white shadow-sm text-gray-900' : 'text-gray-500 hover:text-gray-700'}`}
                                        >
                                            {m === 'pse' ? 'PSE' : m}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Soporte (Opcional)</label>
                                <label className="w-full border-2 border-dashed border-gray-200 rounded-3xl p-6 flex flex-col items-center justify-center gap-3 bg-gray-50/50 hover:bg-gray-50 cursor-pointer transition-colors relative overflow-hidden">
                                    <input type="file" accept="image/*" capture="environment" onChange={handleFileChange} className="absolute inset-0 opacity-0 cursor-pointer" />
                                    {receiptFile ? (
                                        <div className="text-center">
                                            <div className="w-12 h-12 rounded-full bg-green-100 text-green-600 flex items-center justify-center mx-auto mb-2">
                                                <IconCheckCircle className="w-6 h-6" />
                                            </div>
                                            <p className="text-xs font-bold text-green-600">Imagen lista</p>
                                            <p className="text-[10px] text-gray-500 mt-1 truncate max-w-[200px]">{receiptFile.name}</p>
                                        </div>
                                    ) : (
                                        <>
                                            <div className="w-12 h-12 rounded-full bg-white shadow-sm flex items-center justify-center text-gray-400">
                                                <IconCamera className="w-6 h-6" />
                                            </div>
                                            <p className="text-xs font-medium text-gray-500">Tomar foto o subir comprobante</p>
                                        </>
                                    )}
                                </label>
                            </div>
                        </div>

                        <div className="p-6 border-t border-gray-50 bg-white shrink-0">
                            <button
                                onClick={handlePayment}
                                disabled={isLoading}
                                className="w-full bg-nequi hover:bg-nequi-dark text-white font-bold py-4.5 rounded-[20px] shadow-[0_8px_20px_rgba(218,0,129,0.3)] active:scale-[0.98] transition-all flex justify-center items-center gap-2 text-lg disabled:opacity-70 disabled:cursor-not-allowed"
                            >
                                {isLoading ? 'Procesando...' : 'Registrar Ingreso'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Auth View (Login/Register) ---
        const AuthView = ({ onSession }) => {
            const [isLogin, setIsLogin] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');

            const handleAuth = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                setIsLoading(true);

                try {
                    if (isLogin) {
                        const { data, error } = await supabase.auth.signInWithPassword({
                            email,
                            password,
                        });
                        if (error) throw error;
                        if (data.session) onSession(data.session);
                    } else {
                        const { data, error } = await supabase.auth.signUp({
                            email,
                            password,
                        });
                        if (error) throw error;
                        alert('Registro exitoso. Revisa tu correo (si está configurado) o inicia sesión.');
                        setIsLogin(true);
                    }
                } catch (error) {
                    console.error('Error Auth:', error);
                    setErrorMsg(error.message || 'Error en la autenticación.');
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-surface flex flex-col items-center justify-center p-6 slide-up-fade">
                    <div className="w-full max-w-sm bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 p-8 text-center relative overflow-hidden">
                        <div className="absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-nequi to-nequi-light"></div>
                        <div className="w-20 h-20 rounded-2xl bg-nequi text-white flex items-center justify-center mx-auto mb-6 shadow-[0_8px_20px_rgba(218,0,129,0.3)]">
                            <IconBanknote className="w-10 h-10" />
                        </div>
                        <h2 className="text-2xl font-black text-gray-900 mb-2">
                            {isLogin ? 'Inicia Sesión' : 'Crea tu Cuenta'}
                        </h2>
                        <p className="text-sm text-gray-500 mb-8">
                            {isLogin ? 'Ingresa para gestionar tus préstamos' : 'Únete y empieza a prestar hoy'}
                        </p>

                        {errorMsg && (
                            <div className="mb-4 p-3 bg-red-50 border border-red-100 text-red-600 text-sm rounded-xl text-left">
                                {errorMsg}
                            </div>
                        )}

                        <form onSubmit={handleAuth} className="space-y-4">
                            <div className="text-left">
                                <label className="block text-xs font-bold text-gray-700 mb-1">Correo Electrónico</label>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={e => setEmail(e.target.value)}
                                    placeholder="tu@correo.com"
                                    className="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-nequi focus:bg-white transition-all text-sm font-medium"
                                    required
                                />
                            </div>
                            <div className="text-left mb-6">
                                <label className="block text-xs font-bold text-gray-700 mb-1">Contraseña</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={e => setPassword(e.target.value)}
                                    placeholder="••••••••"
                                    className="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-nequi focus:bg-white transition-all text-sm font-medium"
                                    required
                                />
                            </div>

                            <button
                                type="submit"
                                disabled={isLoading}
                                className="w-full bg-nequi hover:bg-nequi-dark text-white font-bold py-3.5 rounded-2xl shadow-[0_8px_20px_rgba(218,0,129,0.3)] active:scale-[0.98] transition-all disabled:opacity-70 disabled:cursor-not-allowed"
                            >
                                {isLoading ? 'Cargando...' : (isLogin ? 'Entrar' : 'Registrarse')}
                            </button>
                        </form>

                        <div className="mt-6 text-sm">
                            <span className="text-gray-500">{isLogin ? '¿No tienes cuenta? ' : '¿Ya tienes cuenta? '}</span>
                            <button onClick={() => { setIsLogin(!isLogin); setErrorMsg(''); }} className="font-bold text-nequi hover:underline">
                                {isLogin ? 'Regístrate aquí' : 'Inicia Sesión'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Cerrar Caja Modal ---
        const CerrarCajaModal = ({ isOpen, onClose, recaudoHoy, gastosHoy }) => {
            const [efectivoMano, setEfectivoMano] = useState('');
            const [observaciones, setObservaciones] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            const efectivoEsperado = recaudoHoy - gastosHoy;
            const diferencia = Number(efectivoMano) - efectivoEsperado;

            const handleCerrarCaja = async () => {
                if (!supabase) {
                    alert('Modo Local: Simulación de Cierre exitosa.');
                    onClose();
                    return;
                }

                setIsLoading(true);
                try {
                    const { error } = await supabase.from('daily_closures').insert({
                        tenant_id: DEFAULT_TENANT_ID,
                        recaudo_total: recaudoHoy,
                        gastos_total: gastosHoy,
                        efectivo_esperado: efectivoEsperado,
                        efectivo_real: Number(efectivoMano),
                        diferencia: diferencia,
                        observaciones: observaciones
                    });

                    if (error) throw error;
                    alert('Cierre de caja registrado exitosamente.');
                    onClose();
                } catch (error) {
                    console.error('Error cerrando caja:', error);
                    alert('Hubo un error al guardar el cierre.');
                } finally {
                    setIsLoading(false);
                }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 sm:p-0">
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onClick={onClose}></div>
                    <div className="bg-white w-full sm:max-w-md rounded-[30px] shadow-2xl z-10 relative overflow-hidden flex flex-col slide-up-fade">
                        <div className="bg-gray-900 px-6 py-6 text-center text-white relative">
                            <button onClick={onClose} className="absolute top-4 right-4 p-2 bg-white/10 hover:bg-white/20 rounded-full transition-colors">
                                <IconClose className="w-5 h-5" />
                            </button>
                            <h3 className="text-xl font-extrabold tracking-tight">Cierre de Caja</h3>
                            <p className="text-gray-400 text-sm mt-1">Resumen del día de hoy</p>
                        </div>

                        <div className="p-6 space-y-4">
                            <div className="grid grid-cols-2 gap-4 mb-2">
                                <div className="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                    <p className="text-xs font-bold text-gray-500 mb-1">Recaudo Total</p>
                                    <p className="font-extrabold text-nequi">{formatCurrency(recaudoHoy)}</p>
                                </div>
                                <div className="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                    <p className="text-xs font-bold text-gray-500 mb-1">Gastos Total</p>
                                    <p className="font-extrabold text-gray-700">{formatCurrency(gastosHoy)}</p>
                                </div>
                            </div>

                            <div className="bg-blue-50/50 p-4 rounded-2xl border border-blue-100 flex justify-between items-center">
                                <span className="font-bold text-gray-700 text-sm">Efectivo Esperado</span>
                                <span className="font-black text-gray-900 text-lg">{formatCurrency(efectivoEsperado)}</span>
                            </div>

                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">Efectivo en Mano</label>
                                <div className="relative">
                                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-medium">$</span>
                                    <input
                                        type="number"
                                        value={efectivoMano}
                                        onChange={(e) => setEfectivoMano(e.target.value)}
                                        className="w-full pl-8 pr-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-nequi transition-all font-semibold text-lg text-gray-900"
                                    />
                                </div>
                            </div>

                            {efectivoMano !== '' && (
                                <div className={`p-4 rounded-2xl border flex justify-between items-center ${diferencia < 0 ? 'bg-red-50 border-red-100 text-red-700' : diferencia > 0 ? 'bg-green-50 border-green-100 text-green-700' : 'bg-gray-50 border-gray-100 text-gray-700'}`}>
                                    <span className="font-bold text-sm">{diferencia < 0 ? 'Faltante' : diferencia > 0 ? 'Sobrante' : 'Cuadre Perfecto'}</span>
                                    <span className="font-black text-lg">{formatCurrency(diferencia)}</span>
                                </div>
                            )}

                            <div>
                                <label className="block text-xs font-bold text-gray-700 mb-2">Observaciones</label>
                                <input type="text" value={observaciones} onChange={e => setObservaciones(e.target.value)} placeholder="Opcional" className="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-900 transition-all text-sm font-medium" />
