        // --- Utilidades: Compresión de Imagen (Canvas) ---
        const compressImage = (file, maxWidth = 1024) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        // Compresión al 70%
                        canvas.toBlob((blob) => {
                            resolve(blob);
                        }, 'image/jpeg', 0.7);
                    };
                    img.onerror = (error) => reject(error);
                };
                reader.onerror = (error) => reject(error);
            });

                                    <h1 className="text-3xl font-extrabold tracking-tight mt-1">Hola, {tenantName || 'Admin'} 👋</h1>
                                </div>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                                    <div className="w-10 h-10 bg-gray-800 text-white rounded-full flex items-center justify-center font-bold text-sm border border-gray-700">
                                        {(tenantName || 'A').charAt(0).toUpperCase()}
                                    </div>
                                    {onLogout && (
                                        <button onClick={onLogout}
                                            style={{ background: 'rgba(239,68,68,0.15)', border: '1px solid rgba(239,68,68,0.3)', borderRadius: 10, padding: '6px 12px', color: '#ef4444', fontSize: 11, fontWeight: 600, cursor: 'pointer' }}>
                                            Salir
                                        </button>
                                    )}
                                </div>
                            </div>
                            {/* Selector de Mes */}
                            <div className="inline-flex items-center gap-2 bg-gray-800/80 backdrop-blur-md px-4 py-2 rounded-full border border-gray-700 cursor-pointer hover:bg-gray-700 transition-colors">
                                <span className="text-sm font-medium text-gray-200">Mes actual: Abril 2026</span>
                                <IconChevronDown className="w-4 h-4 text-gray-400" />
                            </div>
                        </div>
                    </div>

                    <div className="max-w-md mx-auto px-6 -mt-16 space-y-4 relative z-10">
                        {/* Tarjeta 1: Cartera Total Colocada */}
                        <div className="bg-white rounded-3xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.06)] border border-gray-50 flex flex-col gap-2">
                            <p className="text-sm font-medium text-gray-500">Cartera Total Colocada</p>
                            <h2 className="text-4xl font-extrabold text-gray-900 tracking-tight">{formatCurrency(carteraTotalColocada)}</h2>
                            <div className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-green-50 text-green-700 text-xs font-bold w-max mt-1">
                                <span>▲ 12% vs mes anterior</span>
                            </div>
                        </div>

                        {/* Tarjetas Duales: Activos y Mora */}
                        <div className="grid grid-cols-2 gap-4">
                            {/* Créditos Activos */}
                            <div className="bg-white rounded-3xl p-5 shadow-[0_8px_30px_rgb(0,0,0,0.06)] border border-gray-50 flex flex-col justify-between">
                                <p className="text-xs font-medium text-gray-500 mb-2">Créditos Activos</p>
                                <h3 className="text-2xl font-bold text-gray-900 mb-3">{creditosActivos.length}</h3>
                                {/* Mini Avatars */}
                                <div className="flex -space-x-2 overflow-hidden">
                                    {creditosActivos.slice(0, 3).map((loan, i) => (
                                        <div key={i} className="inline-block h-8 w-8 rounded-full ring-2 ring-white bg-nequi-light text-nequi font-bold flex items-center justify-center text-xs">
                                            {loan.clientName.charAt(0)}
                                        </div>
                                    ))}
                                    {creditosActivos.length > 3 && (
                                        <div className="inline-block h-8 w-8 rounded-full ring-2 ring-white bg-gray-100 text-gray-600 font-bold flex items-center justify-center text-[10px]">
                                            +{creditosActivos.length - 3}
                                        </div>
                                    )}
                                </div>
                            </div>
                            {/* Créditos en Mora */}
                            <div className="bg-white rounded-3xl p-5 shadow-[0_8px_30px_rgb(0,0,0,0.06)] border border-gray-50 flex flex-col justify-between relative overflow-hidden">
                                <div className="absolute top-0 right-0 w-16 h-16 bg-red-50 rounded-bl-[40px] -z-10"></div>
                                <p className="text-xs font-medium text-gray-500 mb-2">Créditos en Mora</p>
                                <h3 className="text-2xl font-bold text-red-600 mb-3">{creditosMora.length}</h3>
                                <div className="inline-flex items-center gap-1.5 px-2 py-1 rounded-full bg-red-50 text-red-700 text-[10px] font-bold w-max">
                                    <span>▼ 5% vs mes ant.</span>
                                </div>
                            </div>
                        </div>

                        {/* Tarjeta 4: Capital Pendiente */}
                        <div className="bg-white rounded-3xl p-6 shadow-[0_8px_30px_rgb(0,0,0,0.06)] border border-gray-50 flex items-center justify-between">
                            <div>
                                <p className="text-sm font-medium text-gray-500 mb-1">Capital Pendiente</p>
                                <h3 className="text-2xl font-bold text-gray-900">{formatCurrency(capitalPendiente)}</h3>
                            </div>
                            <div className="w-12 h-12 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            </div>
                        </div>

                        {/* Acciones Rápidas */}
                        <div className="grid grid-cols-2 gap-4 mt-2">
                            <button
                                onClick={onOpenGasto}
                                className="bg-white rounded-3xl p-4 shadow-sm border border-gray-100 flex flex-col items-center gap-3 hover:bg-gray-50 transition-colors active:scale-95"
                            >
                                <div className="w-12 h-12 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center">
                                    <IconPlus className="w-6 h-6" />
                                </div>
                                <span className="text-sm font-bold text-gray-700">Agregar Gasto</span>
                            </button>
                            <button
                                onClick={onOpenCobro}
                                className="bg-white rounded-3xl p-4 shadow-sm border-2 border-nequi-light flex flex-col items-center gap-3 hover:bg-nequi-light/20 transition-colors active:scale-95"
                            >
                                <div className="w-12 h-12 rounded-full bg-nequi-light text-nequi flex items-center justify-center">
                                    <IconBanknote className="w-6 h-6" />
                                </div>
                                <span className="text-sm font-bold text-nequi">Registrar Ingreso</span>
                            </button>
                        </div>

                    </div>
                </div>
            );
        };

        // --- New Loan Modal ---
        const NewLoanModal = ({ isOpen, onClose, creditLines, onSuccess }) => {
            const [selectedLineId, setSelectedLineId] = useState('');
            const [monto, setMonto] = useState(1000000);
            // interestType viene de la línea de crédito seleccionada
            const [interestType, setInterestType] = useState('simple');
            const [interestRate, setInterestRate] = useState(20);
            const [frecuencia, setFrecuencia] = useState('mensual');
            // cuotas = número de MESES del crédito
            const [meses, setMeses] = useState(1);

            const [clientName, setClientName] = useState('');
            const [documentId, setDocumentId] = useState('');
            const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
            const [nextPaymentDate, setNextPaymentDate] = useState('');
            const [phoneMain, setPhoneMain] = useState('');
            const [phoneBackup, setPhoneBackup] = useState('');
            const [address, setAddress] = useState('');
            const [reference, setReference] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            // Reset del formulario al abrir el modal
            useEffect(() => {
                if (isOpen) {
                    setSelectedLineId('');
                    setMonto(1000000);
                    setInterestType('simple');
                    setInterestRate(20);
                    setFrecuencia('mensual');
                    setMeses(1);
                    setClientName('');
                    setDocumentId('');
                    setStartDate(new Date().toISOString().split('T')[0]);
                    setNextPaymentDate('');
                    setPhoneMain('');
                    setPhoneBackup('');
                    setAddress('');
                    setReference('');
                }
            }, [isOpen]);

            // ── Motor de Cálculo Financiero ─────────────────────────────────────────
            // Multiplicadores de cuotas por mes según frecuencia
            const freqMultiplier = { mensual: 1, quincenal: 2, semanal: 4, diario: 30 };
            const cuotasPorMes = freqMultiplier[frecuencia] || 1;
            // Total de cuotas = meses × cuotas por mes
            const totalCuotas = Math.max(meses, 1) * cuotasPorMes;
            const rate = (interestRate || 20) / 100; // tasa mensual

            let totalIntereses = 0;
            let montoFinal = 0;
            let valorCuota = 0;

            if (monto > 0 && meses > 0) {
                if (interestType === 'simple') {
                    // Interés simple: Capital × tasa × meses
                    totalIntereses = monto * rate * meses;
                    montoFinal = monto + totalIntereses;
                } else {
                    // Interés compuesto: Capital × (1 + tasa)^meses
                    montoFinal = monto * Math.pow(1 + rate, meses);
                    totalIntereses = montoFinal - monto;
                }
                valorCuota = montoFinal / totalCuotas;
            }
            // ─────────────────────────────────────────────────────────────────────────

            const handleLineSelection = (lineId) => {
                setSelectedLineId(lineId);
                if (lineId === 'custom') return;
                const line = creditLines.find(l => l.id === lineId);
                if (line) {
                    setInterestRate(line.rate);
                    setInterestType(line.type || 'simple');
                }
            };

            const handleCreateCredit = async () => {
                if (!clientName || !documentId || !monto || !meses || !phoneMain) {
                    alert('Por favor completa los campos obligatorios (Nombre, Documento, Teléfono, Monto, Meses).');
                    return;
                }
                setIsLoading(true);
                try {
                    if (supabase) {
                        let clientId;
                        const { data: existingClient } = await supabase
                            .from('clients').select('id')
                            .eq('tenant_id', DEFAULT_TENANT_ID)
                            .eq('document_id', documentId).maybeSingle();

                        if (existingClient) {
                            clientId = existingClient.id;
                        } else {
                            const { data: newClient, error: createClientError } = await supabase
                                .from('clients')
                                .insert({
                                    tenant_id: DEFAULT_TENANT_ID,
                                    name: clientName,
                                    document_id: documentId,
                                    phone_main: phoneMain,
                                    phone_backup: phoneBackup || null,
                                    address: address || null,
                                    reference_point: reference || null
                                })
                                .select('id').single();
                            if (createClientError) throw createClientError;
                            clientId = newClient.id;
                        }

                        const loanInsert = {
                                tenant_id: DEFAULT_TENANT_ID,
                                client_id: clientId,
                                amount: Number(monto),
                                frequency: frecuencia,
                                interest_rate: Number(interestRate),
                                interest_type: interestType,
                                installments_total: totalCuotas,
                                installments_paid: 0,
                                // balance = Total a pagar (capital + intereses completos)
                                balance: Math.round(montoFinal),
                                start_date: startDate,
                                status: 'active'
                            };
                        // Agregar fecha pactada de cobro si se proporcionó
                        if (nextPaymentDate) {
                            loanInsert.next_payment_date = nextPaymentDate;
                        }
                        const { error: loanError } = await supabase
                            .from('loans')
                            .insert(loanInsert);
                        if (loanError) throw loanError;
                        alert(`✅ Crédito creado!\n💰 Capital: ${formatCurrency(monto)}\n📈 Interés: ${formatCurrency(totalIntereses)}\n💳 Total: ${formatCurrency(montoFinal)}\n📋 Cuota: ${formatCurrency(valorCuota)} × ${totalCuotas}`);
                    } else {
                        alert('Modo Local: Crédito simulado.');
                    }
                    if (onSuccess) onSuccess();
                    onClose();
                } catch (error) {
                    console.error('Error creando crédito:', error);
                    alert('Error al crear crédito: ' + (error.message || 'Error desconocido'));
                } finally {
                    setIsLoading(false);
                }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4 sm:p-0">
                    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onClick={onClose}></div>

                    <div className="bg-white w-full sm:max-w-md rounded-t-3xl sm:rounded-3xl shadow-2xl z-10 relative overflow-hidden flex flex-col max-h-[90vh] slide-up-fade">
                        <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-white sticky top-0 z-20">
                            <h3 className="text-xl font-bold text-gray-900">Nuevo Préstamo</h3>
                            <button onClick={onClose} className="p-2 bg-gray-50 text-gray-400 hover:text-gray-600 rounded-full transition-colors">
                                <IconClose className="w-5 h-5" />
                            </button>
                        </div>

                        <div className="p-6 overflow-y-auto flex-1 space-y-6">

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Nombre del Cliente</label>
                                <input type="text" value={clientName} onChange={e => setClientName(e.target.value)} placeholder="Ej. Juan Pérez" className="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-nequi focus:border-transparent transition-all font-semibold text-gray-900" />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">NIT o Cédula</label>
                                <input type="text" value={documentId} onChange={e => setDocumentId(e.target.value)} placeholder="Ej. 123456789" className="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-nequi focus:border-transparent transition-all font-semibold text-gray-900" />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Fecha de Inicio</label>
                                <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-nequi focus:border-transparent transition-all font-semibold text-gray-900" />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">📅 Fecha Pactada de Cobro <span className="text-xs text-gray-400 font-normal">(Opcional)</span></label>
                                <input type="date" value={nextPaymentDate} onChange={e => setNextPaymentDate(e.target.value)} className="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-nequi focus:border-transparent transition-all font-semibold text-gray-900" />
                                <p className="text-[10px] text-gray-400 mt-1">Fecha en que se le debe cobrar al cliente. Si no se define, se calculará automáticamente según la frecuencia.</p>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-medium text-gray-500 mb-2">Teléfono WhatsApp</label>
                                    <div className="relative">
                                        <div className="absolute left-3 top-1/2 -translate-y-1/2 w-6 h-6 rounded-full bg-green-100 text-green-600 flex items-center justify-center">
                                            <IconMessageCircle className="w-3.5 h-3.5" />
                                        </div>
                                        <input type="tel" value={phoneMain} onChange={e => setPhoneMain(e.target.value)} placeholder="Ej. 3001234567" className="w-full pl-11 pr-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-nequi focus:border-transparent transition-all font-semibold text-gray-900 text-sm" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-gray-500 mb-2">Teléfono Respaldo</label>
                                    <input type="tel" value={phoneBackup} onChange={e => setPhoneBackup(e.target.value)} placeholder="Opcional" className="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-nequi focus:border-transparent transition-all font-semibold text-gray-900 text-sm" />
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Dirección</label>
                                <input type="text" value={address} onChange={e => setAddress(e.target.value)} placeholder="Ej. Cra 45 # 12-34" className="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-nequi focus:border-transparent transition-all font-semibold text-gray-900" />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Punto de Referencia</label>
                                <input type="text" value={reference} onChange={e => setReference(e.target.value)} placeholder="Ej. Casa de rejas blancas, frente a la tienda" className="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-nequi focus:border-transparent transition-all font-semibold text-gray-900" />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Línea de Crédito</label>
                                <div className="relative">
                                    <select
                                        value={selectedLineId}
                                        onChange={(e) => handleLineSelection(e.target.value)}
                                        className="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-nequi focus:border-transparent transition-all font-semibold text-gray-900 appearance-none bg-white"
                                    >
                                        <option value="" disabled>Selecciona una línea...</option>
                                        {creditLines.map(line => (
                                            <option key={line.id} value={line.id}>{line.name} ({line.rate}% {line.type})</option>
                                        ))}
                                        <option value="custom">Personalizado (Manual)</option>
                                    </select>
                                    <IconChevronDown className="w-4 h-4 absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none" />
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Monto a Prestar</label>
                                <div className="relative">
                                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-medium">$</span>
                                    <input
                                        type="number"
                                        value={monto}
                                        onChange={(e) => setMonto(Number(e.target.value))}
                                        className="w-full pl-8 pr-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-nequi focus:border-transparent transition-all font-semibold text-lg text-gray-900"
                                    />
                                </div>
                            </div>

                            {/* Frecuencia de pago */}
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-xs font-medium text-gray-500 mb-2">Frecuencia de Pago</label>
                                    <div className="relative">
                                        <select
                                            value={frecuencia}
                                            onChange={(e) => setFrecuencia(e.target.value)}
                                            className="w-full px-4 py-3 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-nequi focus:border-transparent transition-all font-semibold text-gray-900 appearance-none bg-white"
                                        >
                                            <option value="diario">Diario (30/mes)</option>
                                            <option value="semanal">Semanal (4/mes)</option>
                                            <option value="quincenal">Quincenal (2/mes)</option>
                                            <option value="mensual">Mensual (1/mes)</option>
                                        </select>
                                        <IconChevronDown className="w-4 h-4 absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none" />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-xs font-medium text-gray-500 mb-2">Duración (Meses)</label>
                                    <div style={{ display: 'flex', alignItems: 'center', border: '1.5px solid #e5e7eb', borderRadius: '16px', overflow: 'hidden', background: '#fff' }}>
                                        {/* Botón Menos */}
                                        <button
                                            type="button"
                                            onClick={() => setMeses(prev => Math.max(1, prev - 1))}
                                            style={{ minWidth: '44px', minHeight: '44px', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#fdf2f8', border: 'none', borderRight: '1.5px solid #f9e0f3', cursor: 'pointer', flexShrink: 0, transition: 'background 0.15s' }}
                                            onMouseDown={e => e.currentTarget.style.background = '#f5c6e8'}
                                            onMouseUp={e => e.currentTarget.style.background = '#fdf2f8'}
                                            onTouchStart={e => e.currentTarget.style.background = '#f5c6e8'}
                                            onTouchEnd={e => e.currentTarget.style.background = '#fdf2f8'}
                                            aria-label="Disminuir duración"
                                        >
                                            <svg width="18" height="18" fill="none" stroke="#DA0081" strokeWidth="2.5" strokeLinecap="round" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12" /></svg>
                                        </button>
                                        {/* Input central */}
                                        <input
                                            type="number"
                                            inputMode="numeric"
                                            pattern="[0-9]*"
                                            value={meses}
                                            min="1"
                                            onChange={(e) => {
                                                const val = parseInt(e.target.value, 10);
                                                setMeses(isNaN(val) || val < 1 ? 1 : val);
                                            }}
                                            style={{ flex: 1, border: 'none', outline: 'none', textAlign: 'center', fontSize: '20px', fontWeight: '700', color: '#111827', background: 'transparent', padding: '10px 4px', minWidth: 0, WebkitAppearance: 'none', MozAppearance: 'textfield' }}
                                        />
                                        {/* Botón Más */}
                                        <button
                                            type="button"
                                            onClick={() => setMeses(prev => prev + 1)}
                                            style={{ minWidth: '44px', minHeight: '44px', display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#fdf2f8', border: 'none', borderLeft: '1.5px solid #f9e0f3', cursor: 'pointer', flexShrink: 0, transition: 'background 0.15s' }}
                                            onMouseDown={e => e.currentTarget.style.background = '#f5c6e8'}
                                            onMouseUp={e => e.currentTarget.style.background = '#fdf2f8'}
                                            onTouchStart={e => e.currentTarget.style.background = '#f5c6e8'}
                                            onTouchEnd={e => e.currentTarget.style.background = '#fdf2f8'}
                                            aria-label="Aumentar duración"
                                        >
                                            <svg width="18" height="18" fill="none" stroke="#DA0081" strokeWidth="2.5" strokeLinecap="round" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            {/* Vista Previa del Crédito */}
                            <div className="bg-nequi-light/30 border border-nequi-light rounded-2xl p-5 space-y-2.5 mt-2">
                                <h4 className="text-xs font-bold text-nequi-dark uppercase tracking-wider mb-3">
                                    Vista Previa — {selectedLineId && selectedLineId !== 'custom' ? (creditLines.find(l => l.id === selectedLineId) || {}).name : 'Personalizado'}
                                    {' '}<span className="font-normal normal-case text-gray-400">({interestType === 'simple' ? 'Interés Simple' : 'Interés Compuesto'})</span>
                                </h4>
                                <div className="flex justify-between items-center">
                                    <span className="text-sm text-gray-600">Capital</span>
                                    <span className="font-bold text-gray-900">{formatCurrency(monto)}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="text-sm text-gray-600">Interés ({interestRate}% × {meses} mes{meses !== 1 ? 'es' : ''})</span>
                                    <span className="font-semibold text-nequi">+ {formatCurrency(totalIntereses)}</span>
                                </div>
                                <div className="h-px w-full bg-nequi-light my-1"></div>
                                <div className="flex justify-between items-center">
                                    <span className="text-sm font-bold text-gray-800">Total a Pagar</span>
                                    <span className="text-lg font-extrabold text-gray-900">{formatCurrency(montoFinal)}</span>
                                </div>
                                <div className="h-px w-full bg-nequi-light my-1"></div>
                                <div className="flex justify-between items-center">
                                    <span className="text-sm text-gray-600">Valor de la Cuota</span>
                                    <span className="font-extrabold text-nequi">{formatCurrency(valorCuota)}</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="text-sm text-gray-500">N° de Cuotas</span>
                                    <span className="font-semibold text-gray-700">{totalCuotas} cuotas {frecuencia}s</span>
                                </div>
                            </div>
                        </div>

                        <div className="p-6 border-t border-gray-50 bg-white sticky bottom-0 z-20">
                            <button
                                onClick={handleCreateCredit}
                                disabled={isLoading}
                                className="w-full bg-nequi hover:bg-nequi-dark text-white font-bold py-4 rounded-2xl shadow-[0_8px_20px_rgba(218,0,129,0.3)] active:scale-[0.98] transition-all flex justify-center items-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed"
                            >
                                {isLoading ? 'Procesando...' : 'Crear Crédito'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Edit Loan Modal ---
        const EditLoanModal = ({ isOpen, onClose, loan, onSuccess }) => {
            const [amount, setAmount] = useState(0);
            const [balance, setBalance] = useState(0);
            const [paid, setPaid] = useState(0);
            const [total, setTotal] = useState(0);

            // Campos de Cliente
            const [clientName, setClientName] = useState('');
            const [documentId, setDocumentId] = useState('');
            const [phone, setPhone] = useState('');
            const [address, setAddress] = useState('');

            const [isLoading, setIsLoading] = useState(false);

            useEffect(() => {
                if (isOpen && loan) {
                    setAmount(loan.amount);
                    setBalance(loan.balance);
                    setPaid(loan.installmentsPaid);
                    setTotal(loan.totalInstallments);

                    setClientName(loan.clientName);
                    setDocumentId(loan.documentId || ''); // Necesitamos asegurar que estos vengan en el objeto mapeado
                    setPhone(loan.phone || '');
                    setAddress(loan.address || '');
                }
            }, [isOpen, loan]);

            const handleUpdate = async () => {
                setIsLoading(true);
                try {
                    // 1. Actualizar Datos del Cliente
                    if (loan.clientId) {
                        const { error: clientError } = await supabase
                            .from('clients')
                            .update({
                                name: clientName,
                                phone_main: phone,
                                address: address
                            })
                            .eq('id', loan.clientId)
                            .eq('tenant_id', DEFAULT_TENANT_ID);
                        if (clientError) throw clientError;
                    }

                    // 2. Actualizar Datos del Préstamo
                    const { error } = await supabase
                        .from('loans')
                        .update({
                            amount: Number(amount),
                            balance: Number(balance),
                            installments_paid: Number(paid),
                            installments_total: Number(total),
                            status: Number(balance) <= 0 ? 'completed' : 'active'
                        })
                        .eq('id', loan.id)
                        .eq('tenant_id', DEFAULT_TENANT_ID);

                    if (error) throw error;
                    alert('Datos actualizados exitosamente.');
                    if (onSuccess) await onSuccess();
                    onClose();
                } catch (error) {
                    console.error('Error updating loan/client:', error);
                    alert('Error al actualizar: ' + error.message);
                } finally {
                    setIsLoading(false);
                }
            };

            if (!isOpen || !loan) return null;

            return (
                <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-4">
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="bg-white w-full sm:max-w-lg rounded-[30px] shadow-2xl z-10 relative overflow-hidden flex flex-col max-h-[90vh] slide-up-fade">
                        <div className="bg-gray-900 px-6 py-6 text-center text-white relative">
                            <button onClick={onClose} className="absolute top-4 right-4 p-2 bg-white/10 hover:bg-white/20 rounded-full transition-colors">
                                <IconClose className="w-5 h-5 text-white" />
                            </button>
                            <h3 className="text-xl font-extrabold">Editar Información</h3>
                            <p className="text-gray-400 text-sm mt-1">Gestión completa de crédito y cliente</p>
                        </div>

                        <div className="p-6 overflow-y-auto space-y-6">
                            {/* Sección Cliente */}
                            <div className="space-y-4">
                                <h4 className="text-xs font-black text-nequi uppercase tracking-widest border-b border-nequi/10 pb-2">Datos del Cliente</h4>
                                <div>
                                    <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1">Nombre Completo</label>
                                    <input type="text" value={clientName} onChange={e => setClientName(e.target.value)} className="w-full px-4 py-2.5 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-nequi outline-none font-semibold text-gray-800" />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Teléfono</label>
                                        <input type="text" value={phone} onChange={e => setPhone(e.target.value)} className="w-full px-4 py-2.5 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-nequi outline-none font-semibold text-gray-800" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Dirección</label>
                                        <input type="text" value={address} onChange={e => setAddress(e.target.value)} className="w-full px-4 py-2.5 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-nequi outline-none font-semibold text-gray-800" />
                                    </div>
                                </div>
                            </div>

                            {/* Sección Crédito */}
                            <div className="space-y-4">
                                <h4 className="text-xs font-black text-gray-900 uppercase tracking-widest border-b border-gray-100 pb-2">Datos Financieros</h4>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Monto Original</label>
                                        <input type="number" value={amount} onChange={e => setAmount(e.target.value)} className="w-full px-4 py-2.5 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-nequi outline-none font-bold" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Saldo Actual</label>
                                        <input type="number" value={balance} onChange={e => setBalance(e.target.value)} className="w-full px-4 py-2.5 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-nequi outline-none font-bold text-nequi" />
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Cuotas Pagadas</label>
                                        <input type="number" value={paid} onChange={e => setPaid(e.target.value)} className="w-full px-4 py-2.5 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-nequi outline-none font-bold" />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-500 uppercase mb-1">Cuotas Totales</label>
                                        <input type="number" value={total} onChange={e => setTotal(e.target.value)} className="w-full px-4 py-2.5 rounded-xl border border-gray-100 bg-gray-50 focus:bg-white focus:ring-2 focus:ring-nequi outline-none font-bold" />
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="p-6 border-t border-gray-50 bg-gray-50/50">
                            <button onClick={handleUpdate} disabled={isLoading} className="w-full bg-nequi hover:bg-nequi-dark text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-sm">
                                {isLoading ? 'Sincronizando...' : 'Confirmar Cambios'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };


        // --- Cartulina Pagos Modal ---
        const CartulinaPagosModal = ({ isOpen, onClose, loan, businessName }) => {
            const [payments, setPayments] = React.useState([]);
            const [loadingPayments, setLoadingPayments] = React.useState(false);

            // Fetch pagos desde Supabase cuando abre
            React.useEffect(() => {
                if (!isOpen || !loan) return;
                const fetchPayments = async () => {
                    setLoadingPayments(true);
                    try {
                        if (supabase) {
                            const { data, error } = await supabase
                                .from('payments')
                                .select('*')
                                .eq('loan_id', loan.id)
                                .order('created_at', { ascending: true });
                            if (!error && data) setPayments(data);
                        }
                    } catch (e) { console.error(e); }
                    finally { setLoadingPayments(false); }
                };
                fetchPayments();
            }, [isOpen, loan]);

            // Calcular saldo acumulado por pago (running balance)
            const paymentsWithBalance = React.useMemo(() => {
                if (!loan) return [];
                const totalLoan = loan.totalPayable || loan.amount * (1 + (loan.interestRate || 20) / 100);
                let saldoActual = totalLoan;
                return payments.map(p => {
                    saldoActual = Math.max(saldoActual - p.amount, 0);
                    return { ...p, saldoNuevo: saldoActual };
                });
            }, [payments, loan]);

            const totalPagado = payments.reduce((s, p) => s + p.amount, 0);

            const exportToPDF = () => {
                if (typeof window.jspdf === 'undefined' && typeof window.jsPDF === 'undefined') {
                    alert('Librería jsPDF no cargada. Verifica tu conexión.');
                    return;
                }
                const { jsPDF } = window.jspdf || window;
                const doc = new jsPDF({ unit: 'mm', format: 'a4' });
                const marginX = 18;
                let y = 20;

                // Header
                doc.setFillColor(218, 0, 129);
                doc.rect(0, 0, 210, 32, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(18);
                doc.setFont('helvetica', 'bold');
                doc.text(businessName || 'GESTIÓN DE CRÉDITOS', marginX, 14);
                doc.setFontSize(10);
                doc.setFont('helvetica', 'normal');
                doc.text('Cartulina de Pagos — Estado de Cuenta del Cliente', marginX, 22);
                doc.text(`Generado: ${new Date().toLocaleDateString('es-CO')}`, 210 - marginX, 22, { align: 'right' });
                y = 42;

                // Info cliente
                doc.setTextColor(30, 30, 30);
                doc.setFontSize(13);
                doc.setFont('helvetica', 'bold');
                doc.text(`Cliente: ${loan.clientName}`, marginX, y); y += 7;
                doc.setFontSize(10);
                doc.setFont('helvetica', 'normal');
                doc.text(`Préstamo ID: ${loan.id}`, marginX, y);
                doc.text(`Teléfono: ${loan.phone || 'N/A'}`, 110, y); y += 6;
                doc.text(`Capital: ${formatCurrency(loan.amount)}`, marginX, y);
                doc.text(`Cuotas: ${loan.totalInstallments}`, 110, y); y += 6;
                doc.text(`Saldo actual: ${formatCurrency(loan.balance || 0)}`, marginX, y); y += 10;

                // Línea separadora
                doc.setDrawColor(218, 0, 129);
                doc.setLineWidth(0.5);
                doc.line(marginX, y, 210 - marginX, y); y += 6;

                // Tabla de pagos
                doc.setFont('helvetica', 'bold');
                doc.setFontSize(9);
                doc.setTextColor(100, 100, 100);
                doc.text('FECHA', marginX, y);
                doc.text('VALOR PAGADO', 85, y);
                doc.text('SALDO NUEVO', 145, y);
                y += 5;
                doc.setDrawColor(230, 230, 230);
                doc.line(marginX, y, 210 - marginX, y); y += 5;

                doc.setFont('helvetica', 'normal');
                doc.setTextColor(30, 30, 30);
                if (paymentsWithBalance.length === 0) {
                    doc.setTextColor(150, 150, 150);
                    doc.text('Sin pagos registrados aún.', marginX, y); y += 8;
                } else {
                    paymentsWithBalance.forEach((p, idx) => {
                        if (y > 270) { doc.addPage(); y = 20; }
                        if (idx % 2 === 0) {
                            doc.setFillColor(250, 250, 250);
                            doc.rect(marginX - 2, y - 4, 210 - marginX * 2 + 4, 8, 'F');
                        }
                        doc.setTextColor(30, 30, 30);
                        const fecha = new Date(p.created_at).toLocaleDateString('es-CO');
                        doc.text(fecha, marginX, y);
                        doc.text(formatCurrency(p.amount), 85, y);
                        doc.setTextColor(218, 0, 129);
                        doc.text(formatCurrency(p.saldoNuevo), 145, y);
                        doc.setTextColor(30, 30, 30);
                        y += 9;
                    });
                }

                y += 4;
                doc.line(marginX, y, 210 - marginX, y); y += 7;
                doc.setFont('helvetica', 'bold');
                doc.text('Total Pagado:', marginX, y);
                doc.text(formatCurrency(totalPagado), 85, y);
                doc.text('Saldo Final:', 130, y);
                doc.setTextColor(218, 0, 129);
                doc.text(formatCurrency(loan.balance || 0), 160, y);

                doc.save(`Cartulina_${loan.clientName}_${loan.id.slice(0, 8)}.pdf`);
            };

            if (!isOpen || !loan) return null;
            const totalLoan = loan.totalPayable || loan.amount * (1 + (loan.interestRate || 20) / 100);

            return (
                <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, zIndex: 9999 }}>
                    <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.55)', backdropFilter: 'blur(4px)' }} />
                    <div onClick={onClose} style={{ position: 'absolute', inset: 0, overflowY: 'auto', paddingTop: '40px', paddingBottom: '20px', paddingLeft: '10px', paddingRight: '10px', boxSizing: 'border-box' }}>
                        <div onClick={e => e.stopPropagation()} style={{ maxWidth: '420px', margin: '0 auto', borderRadius: '28px', overflow: 'hidden', boxShadow: '0 24px 60px rgba(0,0,0,0.3)' }}>

                            {/* Header magenta */}
                            <div style={{ background: '#DA0081', padding: '28px 24px 20px', textAlign: 'center', position: 'relative' }}>
                                <button onClick={onClose} style={{ position: 'absolute', top: 14, right: 14, width: 32, height: 32, borderRadius: '50%', background: 'rgba(255,255,255,0.2)', border: 'none', cursor: 'pointer', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                    <IconClose className="w-4 h-4" />
                                </button>
                                <div style={{ width: 60, height: 60, borderRadius: '50%', background: '#fff', margin: '0 auto 12px', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                    <IconReceipt className="w-7 h-7" style={{ color: '#DA0081' }} />
                                </div>
                                <h3 style={{ color: '#fff', fontSize: '20px', fontWeight: 800, margin: '0 0 4px' }}>Cartulina de Pagos</h3>
                                <p style={{ color: 'rgba(255,255,255,0.75)', fontSize: '12px', margin: 0 }}>Préstamo #{loan.id.slice(0, 8)}</p>
                            </div>

                            {/* Body */}
                            <div style={{ background: '#fff', padding: '20px' }}>
                                {/* Cliente */}
                                <div style={{ textAlign: 'center', marginBottom: '16px' }}>
                                    <p style={{ fontSize: '11px', color: '#9ca3af', margin: '0 0 2px' }}>Cliente</p>
                                    <p style={{ fontSize: '18px', fontWeight: 800, color: '#111827', margin: 0 }}>{loan.clientName}</p>
                                </div>

                                {/* Contacto */}
                                <div style={{ background: '#f8fafc', borderRadius: '16px', padding: '14px', marginBottom: '16px' }}>
                                    <p style={{ fontSize: '10px', fontWeight: 700, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.05em', margin: '0 0 10px' }}>Contacto y Ubicación</p>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '8px' }}>
                                        <div style={{ width: 32, height: 32, borderRadius: '50%', background: '#dcfce7', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                                            <IconMessageCircle className="w-4 h-4" style={{ color: '#16a34a' }} />
                                        </div>
                                        <div>
                                            <p style={{ fontSize: '10px', color: '#9ca3af', margin: 0 }}>WhatsApp (Principal)</p>
                                            <p style={{ fontSize: '13px', fontWeight: 700, color: '#111827', margin: 0 }}>{loan.phone || 'No registrado'}</p>
                                        </div>
                                    </div>
                                    {(loan.address || loan.reference) && (
                                        <div style={{ display: 'flex', alignItems: 'flex-start', gap: '10px' }}>
                                            <div style={{ width: 32, height: 32, borderRadius: '50%', background: '#fee2e2', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                                                <IconMapPin className="w-4 h-4" style={{ color: '#dc2626' }} />
                                            </div>
                                            <div>
                                                <p style={{ fontSize: '10px', color: '#9ca3af', margin: 0 }}>Dirección</p>
                                                <p style={{ fontSize: '13px', fontWeight: 700, color: '#111827', margin: 0 }}>{loan.address || 'No registrada'}</p>
                                                {loan.reference && <p style={{ fontSize: '11px', color: '#9ca3af', margin: '2px 0 0', fontStyle: 'italic' }}>Ref: {loan.reference}</p>}
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {/* Historial de pagos desde Supabase */}
                                <p style={{ fontSize: '10px', fontWeight: 700, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.05em', margin: '0 0 10px' }}>Historial de Pagos</p>
                                {loadingPayments ? (
                                    <div style={{ textAlign: 'center', padding: '20px', color: '#9ca3af', fontSize: '13px' }}>Cargando pagos...</div>
                                ) : paymentsWithBalance.length === 0 ? (
                                    <div style={{ textAlign: 'center', padding: '20px', background: '#f8fafc', borderRadius: '14px', color: '#9ca3af', fontSize: '13px' }}>
                                        Sin pagos registrados aún.
                                    </div>
                                ) : (
                                    <div style={{ borderRadius: '14px', overflow: 'hidden', border: '1px solid #f1f5f9' }}>
                                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', background: '#f8fafc', padding: '8px 12px' }}>
                                            <span style={{ fontSize: '10px', fontWeight: 700, color: '#9ca3af', textTransform: 'uppercase' }}>Fecha</span>
                                            <span style={{ fontSize: '10px', fontWeight: 700, color: '#9ca3af', textTransform: 'uppercase', textAlign: 'center' }}>Pagado</span>
                                            <span style={{ fontSize: '10px', fontWeight: 700, color: '#9ca3af', textTransform: 'uppercase', textAlign: 'right' }}>Saldo</span>
                                        </div>
                                        {paymentsWithBalance.map((p, i) => (
                                            <div key={p.id} style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', padding: '10px 12px', background: i % 2 === 0 ? '#fff' : '#fafafa', borderTop: '1px solid #f1f5f9' }}>
                                                <span style={{ fontSize: '12px', color: '#4b5563' }}>{new Date(p.created_at).toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: '2-digit' })}</span>
                                                <span style={{ fontSize: '12px', fontWeight: 700, color: '#111827', textAlign: 'center' }}>{formatCurrency(p.amount)}</span>
                                                <span style={{ fontSize: '12px', fontWeight: 700, color: '#DA0081', textAlign: 'right' }}>{formatCurrency(p.saldoNuevo)}</span>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                {/* Resumen totales */}
                                <div style={{ borderTop: '2px dashed #f1f5f9', marginTop: '16px', paddingTop: '14px' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '6px' }}>
                                        <span style={{ fontSize: '13px', color: '#6b7280' }}>Total Pagado</span>
                                        <span style={{ fontSize: '13px', fontWeight: 700, color: '#111827' }}>{formatCurrency(totalPagado)}</span>
                                    </div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                        <span style={{ fontSize: '13px', color: '#6b7280' }}>Saldo Restante</span>
                                        <span style={{ fontSize: '15px', fontWeight: 900, color: '#DA0081' }}>{formatCurrency(loan.balance || 0)}</span>
                                    </div>
                                </div>
                            </div>

                            {/* Footer — botón PDF */}
                            <div style={{ background: '#f8fafc', padding: '14px 20px', borderTop: '1px solid #f1f5f9' }}>
                                <button onClick={exportToPDF} style={{ width: '100%', background: '#fff', border: '1.5px solid #e5e7eb', borderRadius: '14px', padding: '13px', fontSize: '14px', fontWeight: 700, color: '#374151', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px', boxShadow: '0 1px 4px rgba(0,0,0,0.06)' }}>
                                    <IconDownload className="w-4 h-4" />
                                    Exportar a PDF
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };


        // 2. Loans View (Smart Table)
        const LoansView = ({ loans, onOpenCartulina, onDeleteLoan, onInactivateLoan, onEditLoan }) => {
            const [sortConfig, setSortConfig] = useState({ key: 'date', direction: 'desc' });
            const [filter, setFilter] = useState('all');
            const [paymentFilter, setPaymentFilter] = useState('none');
            const [openMenuId, setOpenMenuId] = useState(null);

            // Cierra el menú si se hace clic fuera
            useEffect(() => {
                const handleClickOutside = () => setOpenMenuId(null);
                window.addEventListener('click', handleClickOutside);
                return () => window.removeEventListener('click', handleClickOutside);
            }, []);

            const exportToExcel = () => {
                if (!window.XLSX) { alert('Librería Excel no disponible. Recarga la página.'); return; }
                const data = loans.map(l => ({
                    'Cliente': l.clientName,
                    'Producto': l.lineName || 'General',
                    'Capital Prestado': l.amount,
                    'Total a Pagar': Math.round(l.totalPayable),
                    'Saldo Restante': Math.round(l.balance),
                    'Cuotas Pagadas': l.installmentsPaid,
                    'Total Cuotas': l.totalInstallments,
                    'Valor Cuota': Math.round(l.cuotaValue),
                    'Frecuencia': l.frequency,
                    'Fecha Inicio': l.date,
                    'Estado': l.status === 'active' ? 'Activo' : l.status === 'late' ? 'Atrasado' : l.status === 'inactive' ? 'Inactivo' : l.status === 'completed' ? 'Pagado' : 'Cancelado'
                }));
                const ws = window.XLSX.utils.json_to_sheet(data);
                // Anchos de columna profesionales
                ws['!cols'] = [
                    { wch: 25 }, // Cliente
                    { wch: 20 }, // Producto
                    { wch: 18 }, // Capital
                    { wch: 18 }, // Total
                    { wch: 18 }, // Saldo
                    { wch: 10 }, // Pagadas
                    { wch: 10 }, // Total cuotas
                    { wch: 15 }, // Valor Cuota
                    { wch: 12 }, // Frecuencia
                    { wch: 14 }, // Fecha
                    { wch: 12 }  // Estado
                ];
                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, 'Cartera de Créditos');
                window.XLSX.writeFile(wb, `Cartera_Creditos_${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            const exportToPDF = () => {
                const { jsPDF } = window.jspdf;
                if (!jsPDF) { alert('Libreria PDF no disponible.'); return; }
                const doc = new jsPDF({ orientation: 'landscape' });

                // Header del PDF
                doc.setFontSize(18);
                doc.setTextColor(218, 0, 129); // Nequi Magenta
                doc.text('Reporte de Cartera de Créditos', 14, 15);

                doc.setFontSize(10);
                doc.setTextColor(100, 100, 100);
                doc.text(`Fecha de generación: ${new Date().toLocaleDateString('es-CO')}`, 14, 22);
                doc.text(`Total créditos: ${loans.length}`, 14, 27);

                const rows = loans.map(l => [
                    l.clientName,
                    l.lineName,
                    formatCurrency(l.amount),
                    formatCurrency(l.totalPayable),
                    formatCurrency(l.balance),
                    `${l.installmentsPaid}/${l.totalInstallments}`,
                    l.frequency,
                    l.date,
                    l.status === 'active' ? 'Activo' : l.status === 'late' ? 'Atrasado' : l.status === 'inactive' ? 'Inactivo' : 'Cancelado'
                ]);

                doc.autoTable({
                    startY: 32,
                    head: [['Cliente', 'Producto/Línea', 'Capital', 'Total', 'Saldo', 'Cuotas', 'Frecuencia', 'Inicio', 'Estado']],
                    body: rows,
                    theme: 'striped',
                    styles: {
                        fontSize: 7.5,
                        cellPadding: 3,
                        valign: 'middle',
                        overflow: 'linebreak'
                    },
                    headStyles: {
                        fillColor: [218, 0, 129],
                        textColor: [255, 255, 255],
                        fontStyle: 'bold',
                        halign: 'center'
                    },
                    columnStyles: {
                        0: { cellWidth: 45 }, // Cliente
                        1: { cellWidth: 40 }, // Producto
                        2: { cellWidth: 25, halign: 'right' }, // Capital
                        3: { cellWidth: 25, halign: 'right' }, // Total
                        4: { cellWidth: 25, halign: 'right' }, // Saldo
                        5: { cellWidth: 15, halign: 'center' }, // Cuotas
                        6: { cellWidth: 20, halign: 'center' }, // Frecuencia
                        7: { cellWidth: 20, halign: 'center' }, // Inicio
                        8: { cellWidth: 20, halign: 'center' }  // Estado
                    },
                    alternateRowStyles: {
                        fillColor: [250, 250, 250]
                    },
                    margin: { left: 14, right: 14 }
                });

                doc.save(`reporte_cartera_${new Date().toISOString().split('T')[0]}.pdf`);
            };


            const sortedLoans = useMemo(() => {
                let sortableLoans = [...loans];

                if (filter !== 'all') {
                    sortableLoans = sortableLoans.filter(loan => loan.status === filter);
                }

                // Filtro por fecha de cobro
                if (paymentFilter !== 'none') {
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    const todayStr = today.toISOString().split('T')[0];
                    let maxDate = new Date(today);
                    if (paymentFilter === 'today') maxDate = new Date(today);
                    else if (paymentFilter === 'week') maxDate.setDate(maxDate.getDate() + 7);
                    else if (paymentFilter === 'fortnight') maxDate.setDate(maxDate.getDate() + 15);
                    else if (paymentFilter === 'month') maxDate.setDate(maxDate.getDate() + 30);
                    const maxStr = maxDate.toISOString().split('T')[0];

                    sortableLoans = sortableLoans.filter(loan => {
                        if (!loan.nextPaymentDate) return false;
                        return loan.nextPaymentDate >= todayStr && loan.nextPaymentDate <= maxStr;
                    });
                }

                sortableLoans.sort((a, b) => {
                    if (a[sortConfig.key] < b[sortConfig.key]) {
                        return sortConfig.direction === 'asc' ? -1 : 1;
                    }
                    if (a[sortConfig.key] > b[sortConfig.key]) {
                        return sortConfig.direction === 'asc' ? 1 : -1;
                    }
                    return 0;
                });
                return sortableLoans;
            }, [loans, sortConfig, filter, paymentFilter]);

            const requestSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') {
                    direction = 'desc';
                }
                setSortConfig({ key, direction });
            };

            const getStatusBadge = (status) => {
                switch (status) {
                    case 'active': return <span className="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded-full font-medium">Activo</span>;
                    case 'late': return <span className="px-2 py-1 bg-red-100 text-red-700 text-xs rounded-full font-medium">Atrasado</span>;
                    case 'completed': return <span className="px-2 py-1 bg-green-100 text-green-700 text-xs rounded-full font-medium">Pagado</span>;
                    case 'inactive': return <span className="px-2 py-1 bg-gray-100 text-gray-500 text-xs rounded-full font-medium">Inactivo</span>;
                    default: return null;
                }
            };

            return (
                <div className="pb-24 fade-in" style={{ maxWidth: '100%', margin: '0 auto' }}>
                    {/* Header */}
                    <div style={{ padding: '20px 16px 0', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 12 }}>
                        <div>
                            <h2 style={{ fontSize: 22, fontWeight: 800, color: '#111827', margin: 0 }}>Préstamos</h2>
                            <p style={{ fontSize: 12, color: '#9ca3af', margin: '2px 0 0' }}>Gestiona tu cartera · {sortedLoans.length} registros</p>
                        </div>
                        <div style={{ display: 'flex', gap: 6 }}>
                            <button onClick={exportToExcel} style={{ width: 38, height: 38, borderRadius: 10, border: '1.5px solid #d1fae5', background: '#ecfdf5', color: '#059669', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }} title="Excel"><IconDownload style={{ width: 18, height: 18 }} /></button>
                            <button onClick={exportToPDF} style={{ width: 38, height: 38, borderRadius: 10, border: '1.5px solid #fecdd3', background: '#fff1f2', color: '#e11d48', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }} title="PDF"><IconFileText style={{ width: 18, height: 18 }} /></button>
                        </div>
                    </div>
                    {/* Filters */}
                    <div style={{ padding: '0 16px', display: 'flex', gap: 6, marginBottom: 8, overflowX: 'auto' }}>
                        {['all', 'active', 'late', 'completed', 'inactive'].map(f => (
                            <button key={f} onClick={() => setFilter(f)} style={{ padding: '6px 16px', borderRadius: 20, fontSize: 12, fontWeight: 600, whiteSpace: 'nowrap', border: filter === f ? 'none' : '1px solid #e5e7eb', background: filter === f ? '#DA0081' : '#fff', color: filter === f ? '#fff' : '#6b7280', cursor: 'pointer', boxShadow: filter === f ? '0 3px 12px rgba(218,0,129,0.3)' : 'none' }}>
                                {f === 'all' ? 'Todos' : f === 'active' ? 'Activos' : f === 'late' ? 'Atrasados' : f === 'completed' ? 'Pagados' : 'Inactivos'}
                            </button>
                        ))}
                    </div>
                    {/* Filtros de Fecha de Cobro */}
                    <div style={{ padding: '0 16px', marginBottom: 14 }}>
                        <p style={{ fontSize: 10, fontWeight: 700, color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 6 }}>📅 Cobros Próximos</p>
                        <div style={{ display: 'flex', gap: 6, overflowX: 'auto' }}>
                            {[{k:'none',l:'Sin filtro'},{k:'today',l:'Hoy'},{k:'week',l:'Esta Semana'},{k:'fortnight',l:'Quincena'},{k:'month',l:'Este Mes'}].map(f => (
                                <button key={f.k} onClick={() => setPaymentFilter(f.k)} style={{ padding: '6px 14px', borderRadius: 20, fontSize: 11, fontWeight: 700, whiteSpace: 'nowrap', border: paymentFilter === f.k ? 'none' : '1.5px solid #e0e7ff', background: paymentFilter === f.k ? '#111827' : '#f0f4ff', color: paymentFilter === f.k ? '#fff' : '#4338ca', cursor: 'pointer', boxShadow: paymentFilter === f.k ? '0 3px 12px rgba(0,0,0,0.2)' : 'none', transition: 'all .15s' }}>
                                    {f.l}
                                </button>
                            ))}
                        </div>
                    </div>
                    {/* Scroll hint for mobile */}
                    <div style={{ padding: '0 16px 6px', display: 'flex', alignItems: 'center', gap: 4, color: '#DA0081', fontSize: 11, fontWeight: 600 }}>
                        <span style={{ opacity: 0.6 }}>👆</span> Desliza para ver todas las columnas →
                    </div>
                    {/* Excel Table - Scrollable Container */}
                    <div style={{ margin: '0 8px', border: '2px solid #DA0081', borderRadius: 6, overflow: 'hidden', background: '#fff', boxShadow: '0 4px 20px rgba(0,0,0,0.08)' }}>
                        <div style={{ overflowX: 'auto', WebkitOverflowScrolling: 'touch' }}>
                            {/* Header Row */}
                            <div style={{ display: 'grid', gridTemplateColumns: '150px 110px 110px 75px 95px 85px 85px 110px', minWidth: 820, background: 'linear-gradient(135deg,#DA0081,#c4006f)', color: '#fff', fontSize: 10, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 0.5 }}>
                                <div onClick={() => requestSort('clientName')} style={{ padding: '10px 10px', borderRight: '1px solid rgba(255,255,255,0.2)', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 3 }}>Cliente {sortConfig.key === 'clientName' && (sortConfig.direction === 'asc' ? '▲' : '▼')}</div>
                                <div onClick={() => requestSort('amount')} style={{ padding: '10px 6px', borderRight: '1px solid rgba(255,255,255,0.2)', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 3 }}>Capital {sortConfig.key === 'amount' && (sortConfig.direction === 'asc' ? '▲' : '▼')}</div>
                                <div style={{ padding: '10px 6px', borderRight: '1px solid rgba(255,255,255,0.2)' }}>Saldo</div>
                                <div style={{ padding: '10px 6px', borderRight: '1px solid rgba(255,255,255,0.2)', textAlign: 'center' }}>Cuotas</div>
                                <div onClick={() => requestSort('nextPaymentDate')} style={{ padding: '10px 6px', borderRight: '1px solid rgba(255,255,255,0.2)', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 3 }}>Próx. Cobro {sortConfig.key === 'nextPaymentDate' && (sortConfig.direction === 'asc' ? '▲' : '▼')}</div>
                                <div style={{ padding: '10px 6px', borderRight: '1px solid rgba(255,255,255,0.2)', textAlign: 'center' }}>Estado</div>
                                <div style={{ padding: '10px 6px', textAlign: 'center' }}>Acciones</div>
                            </div>
                            {/* Data Rows */}
                            {sortedLoans.map((loan, idx) => {
                                const addressInfo = loan.address ? ` Estaremos pasando por tu dirección en ${loan.address}${loan.reference ? ` - ${loan.reference}` : ''}.` : '';
                                const whatsappMsg = encodeURIComponent(`Hola ${loan.clientName}, te recordamos tu cuota hoy.${addressInfo}`);
                                const whatsappLink = `https://wa.me/${loan.phone}?text=${whatsappMsg}`;
                                return (
                                    <div key={loan.id} style={{ display: 'grid', gridTemplateColumns: '150px 110px 110px 75px 95px 85px 85px 110px', minWidth: 820, background: idx % 2 === 0 ? '#fff' : '#fdf2f8', borderBottom: '1px solid #f3e8ff', fontSize: 12, transition: 'background .15s' }} onMouseEnter={e => e.currentTarget.style.background = '#fce7f3'} onMouseLeave={e => e.currentTarget.style.background = idx % 2 === 0 ? '#fff' : '#fdf2f8'}>
                                        {/* Cliente */}
                                        <div style={{ padding: '10px 10px', borderRight: '1px solid #f1f5f9', display: 'flex', alignItems: 'center', gap: 7, minWidth: 0 }}>
                                            <div style={{ width: 28, height: 28, borderRadius: '50%', background: 'linear-gradient(135deg,#DA0081,#9333ea)', color: '#fff', fontSize: 11, fontWeight: 800, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{loan.clientName.charAt(0).toUpperCase()}</div>
                                            <span style={{ fontWeight: 700, color: '#111827', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{loan.clientName}</span>
                                        </div>
                                        {/* Capital */}
                                        <div style={{ padding: '10px 6px', borderRight: '1px solid #f1f5f9', fontWeight: 600, color: '#111827', display: 'flex', alignItems: 'center' }}>{formatCurrency(loan.amount)}</div>
                                        {/* Saldo */}
                                        <div style={{ padding: '10px 6px', borderRight: '1px solid #f1f5f9', fontWeight: 700, color: loan.balance <= 0 ? '#059669' : '#DA0081', display: 'flex', alignItems: 'center' }}>{formatCurrency(Math.round(loan.balance))}</div>
                                        {/* Cuotas */}
                                        <div style={{ padding: '10px 6px', borderRight: '1px solid #f1f5f9', textAlign: 'center', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><span style={{ fontWeight: 800, color: '#111827' }}>{loan.installmentsPaid}</span><span style={{ color: '#d1d5db', margin: '0 2px' }}>/</span><span style={{ color: '#6b7280' }}>{loan.totalInstallments}</span></div>
                                        {/* Próx. Cobro */}
                                        <div style={{ padding: '10px 6px', borderRight: '1px solid #f1f5f9', display: 'flex', alignItems: 'center' }}>
                                            {loan.nextPaymentDate ? (() => {
                                                const today = new Date(); today.setHours(0,0,0,0);
                                                const npd = new Date(loan.nextPaymentDate + 'T12:00:00');
                                                const isToday = loan.nextPaymentDate === today.toISOString().split('T')[0];
                                                const isPast = npd < today;
                                                return <span style={{ fontSize: 11, fontWeight: 700, color: isPast ? '#dc2626' : isToday ? '#d97706' : '#059669', background: isPast ? '#fef2f2' : isToday ? '#fffbeb' : '#f0fdf4', padding: '2px 6px', borderRadius: 8 }}>{isToday ? '¡HOY!' : new Date(loan.nextPaymentDate + 'T12:00:00').toLocaleDateString('es-CO', { day:'2-digit', month:'short' })}</span>;
                                            })() : <span style={{ color: '#d1d5db', fontSize: 11 }}>—</span>}
                                        </div>
                                        {/* Estado */}
                                        <div style={{ padding: '10px 8px', borderRight: '1px solid #f1f5f9', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{getStatusBadge(loan.status)}</div>
                                        {/* Acciones */}
                                        <div style={{ padding: '6px 4px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 4 }}>
                                            <button onClick={() => onOpenCartulina(loan)} style={{ width: 28, height: 28, borderRadius: 6, border: '1px solid #e5e7eb', background: '#f9fafb', color: '#6b7280', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', padding: 0 }} title="Cartulina"><IconReceipt style={{ width: 14, height: 14 }} /></button>
